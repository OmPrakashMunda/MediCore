<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>All Reports — Lab</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --color-primary:      #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-secondary:    #0ea5e9;
      --color-bg:           #f8fafc;
      --color-surface:      #ffffff;
      --color-text:         #0f172a;
      --color-muted:        #64748b;
      --color-border:       #e2e8f0;
      --color-success:      #10b981;
      --color-warning:      #f59e0b;
      --color-error:        #ef4444;
      --font-family:        'Inter', sans-serif;
    }
    [data-theme="dark"] {
      --color-bg:      #0f172a;
      --color-surface: #1e293b;
      --color-text:    #f1f5f9;
      --color-muted:   #94a3b8;
      --color-border:  #334155;
    }
    * { font-family:var(--font-family); box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--color-bg); color:var(--color-text); transition:background 0.3s,color 0.3s; }

    .main-content { margin-left:0; padding-top:64px; }
    @media(min-width:1024px) { .main-content { margin-left:260px; } }

    #page-loader {
      position:fixed; inset:0; z-index:9999;
      background:var(--color-bg);
      display:flex; align-items:center; justify-content:center;
      transition:opacity 0.4s;
    }
    #page-loader.hidden { opacity:0; pointer-events:none; }
    .spinner {
      width:36px; height:36px;
      border:3px solid var(--color-border);
      border-top-color:var(--color-primary);
      border-radius:50%; animation:spin 0.75s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    .card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:1rem; }

    /* Sidebar */
    #sidebar {
      position:fixed; top:0; left:0; height:100%; width:260px; z-index:40;
      background:var(--color-surface); border-right:1px solid var(--color-border);
      display:flex; flex-direction:column;
      transform:translateX(-100%); transition:transform 0.3s;
    }
    #sidebar.open { transform:translateX(0); }
    @media(min-width:1024px) { #sidebar { transform:translateX(0); } }
    #sidebar-overlay {
      position:fixed; inset:0; z-index:30;
      background:rgba(0,0,0,0.4); backdrop-filter:blur(3px); display:none;
    }
    #sidebar-overlay.show { display:block; }
    .nav-link {
      display:flex; align-items:center; gap:12px;
      padding:10px 14px; border-radius:12px; font-size:0.85rem; font-weight:500;
      color:var(--color-muted); text-decoration:none; transition:all 0.15s;
    }
    .nav-link:hover  { background:color-mix(in srgb,var(--color-primary) 8%,transparent); color:var(--color-primary); }
    .nav-link.active { background:color-mix(in srgb,var(--color-primary) 12%,transparent); color:var(--color-primary); font-weight:600; }
    .nav-link i { width:18px; text-align:center; }

    /* Topbar */
    #topbar {
      position:fixed; top:0; right:0; left:0; z-index:20; height:64px;
      background:var(--color-surface); border-bottom:1px solid var(--color-border);
      display:flex; align-items:center; justify-content:space-between; padding:0 20px;
    }
    @media(min-width:1024px) { #topbar { left:260px; } }

    /* Filter tab */
    .filter-tab {
      padding:7px 16px; border-radius:10px; font-size:0.8rem; font-weight:500;
      cursor:pointer; border:1.5px solid var(--color-border);
      color:var(--color-muted); background:var(--color-surface);
      transition:all 0.15s; white-space:nowrap;
    }
    .filter-tab:hover  { border-color:var(--color-primary); color:var(--color-primary); }
    .filter-tab.active {
      background:color-mix(in srgb,var(--color-primary) 10%,transparent);
      border-color:var(--color-primary); color:var(--color-primary);
    }

    /* Status badge */
    .status-badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:3px 10px; border-radius:99px; font-size:0.7rem; font-weight:600;
    }

    /* Priority badge */
    .priority-urgent   { background:color-mix(in srgb,#f59e0b 12%,transparent); color:#f59e0b; }
    .priority-critical { background:color-mix(in srgb,#ef4444 12%,transparent); color:#ef4444; }

    /* Table */
    .reports-table { width:100%; border-collapse:collapse; }
    .reports-table thead th {
      padding:10px 14px; text-align:left; font-size:0.75rem;
      font-weight:600; text-transform:uppercase; letter-spacing:0.04em;
      color:var(--color-muted); border-bottom:1px solid var(--color-border);
      white-space:nowrap; cursor:pointer; user-select:none;
    }
    .reports-table thead th:hover { color:var(--color-primary); }
    .reports-table tbody tr {
      border-bottom:1px solid var(--color-border);
      transition:background 0.15s; cursor:pointer;
    }
    .reports-table tbody tr:hover {
      background:color-mix(in srgb,var(--color-primary) 3%,transparent);
    }
    .reports-table tbody tr:last-child { border-bottom:none; }
    .reports-table tbody td { padding:12px 14px; font-size:0.83rem; vertical-align:middle; }
    @media(max-width:768px) {
      .col-hide { display:none; }
    }

    /* Avatar */
    .avatar {
      display:inline-flex; align-items:center; justify-content:center;
      font-weight:700; color:#fff; flex-shrink:0; border-radius:10px;
    }

    /* Input */
    .input-field {
      padding:9px 14px; background:var(--color-bg);
      border:1.5px solid var(--color-border); border-radius:10px;
      color:var(--color-text); font-size:0.85rem; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color:var(--color-primary);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--color-primary) 15%,transparent);
    }

    /* Detail panel */
    #detail-panel {
      position:fixed; top:64px; right:0; bottom:0; width:400px; z-index:30;
      background:var(--color-surface); border-left:1px solid var(--color-border);
      overflow-y:auto; transform:translateX(100%); transition:transform 0.3s;
    }
    #detail-panel.open { transform:translateX(0); }
    @media(max-width:1280px) {
      #detail-panel { width:100%; top:0; z-index:50; border-left:none; }
    }

    /* Btn */
    .btn-primary {
      padding:9px 18px; background:var(--color-primary); color:#fff;
      font-size:0.83rem; font-weight:600; border:none; border-radius:10px;
      cursor:pointer; display:inline-flex; align-items:center; gap:8px;
      transition:background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background:var(--color-primary-dark); transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.55; cursor:not-allowed; transform:none; }

    /* Pagination btn */
    .page-btn {
      min-width:34px; height:34px; border-radius:9px; font-size:0.8rem; font-weight:500;
      border:1.5px solid var(--color-border); background:var(--color-surface);
      color:var(--color-muted); cursor:pointer; display:inline-flex;
      align-items:center; justify-content:center; transition:all 0.15s;
    }
    .page-btn:hover  { border-color:var(--color-primary); color:var(--color-primary); }
    .page-btn.active {
      background:var(--color-primary); border-color:var(--color-primary);
      color:#fff;
    }
    .page-btn:disabled { opacity:0.4; cursor:not-allowed; }

    /* Toast */
    #toast {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(70px);
      padding:11px 20px; border-radius:12px; font-size:0.85rem; font-weight:500;
      display:flex; align-items:center; gap:10px; z-index:9999; opacity:0;
      white-space:nowrap;
      transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      box-shadow:0 8px 24px rgba(0,0,0,0.15);
    }
    #toast.show    { transform:translateX(-50%) translateY(0); opacity:1; }
    #toast.success { background:var(--color-success); color:#fff; }
    #toast.error   { background:var(--color-error);   color:#fff; }
    #toast.info    { background:var(--color-primary);  color:#fff; }

    .fade-up    { animation:fadeUp 0.5s ease forwards; opacity:0; }
    .fade-up.d1 { animation-delay:0.1s; }
    .fade-up.d2 { animation-delay:0.2s; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>

<div id="page-loader"><div class="spinner"></div></div>
<div id="toast"><i id="toast-icon"></i><span id="toast-msg"></span></div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- ══════════════════════════════
     SIDEBAR
══════════════════════════════ -->
<aside id="sidebar">
  <div class="flex items-center gap-3 px-5 py-5"
       style="border-bottom:1px solid var(--color-border)">
    <div class="w-9 h-9 rounded-xl flex items-center justify-center
                text-white text-sm font-bold shrink-0 overflow-hidden"
         style="background:var(--color-primary)">
      <img id="sb-logo-img" src="" alt="" class="w-full h-full object-cover hidden"/>
      <i id="sb-logo-icon" class="fa-solid fa-hospital text-sm"></i>
    </div>
    <div>
      <div id="sb-hospital-name" class="text-sm font-semibold">MediCore</div>
      <div class="text-xs" style="color:var(--color-muted)">Lab Portal</div>
    </div>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <a href="/lab/dashboard/" class="nav-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
    <a href="/lab/reports/"   class="nav-link active"><i class="fa-solid fa-file-waveform"></i> All Reports</a>
    <a href="/lab/upload/"    class="nav-link"><i class="fa-solid fa-file-arrow-up"></i> Upload Report</a>
    <a href="/lab/patients/"  class="nav-link"><i class="fa-solid fa-users"></i> Patients</a>
    <div class="pt-3 pb-1 px-3">
      <p class="text-[10px] font-semibold uppercase tracking-wider"
         style="color:var(--color-muted)">Account</p>
    </div>
    <a href="/lab/profile/"   class="nav-link"><i class="fa-solid fa-circle-user"></i> My Profile</a>
  </nav>

  <div class="px-3 py-4" style="border-top:1px solid var(--color-border)">
    <div class="flex items-center gap-3 px-3 py-2.5 rounded-xl mb-1"
         style="background:color-mix(in srgb,var(--color-primary) 6%,transparent)">
      <div class="w-8 h-8 rounded-xl flex items-center justify-center
                  text-white text-xs shrink-0"
           style="background:var(--color-primary)">
        <i class="fa-solid fa-flask text-xs"></i>
      </div>
      <div class="overflow-hidden">
        <div id="sb-lab-name"  class="text-xs font-semibold truncate">Lab Staff</div>
        <div id="sb-lab-email" class="text-xs truncate" style="color:var(--color-muted)">—</div>
      </div>
    </div>
    <button onclick="labLogout()"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl
                   text-sm transition-colors hover:text-red-500"
            style="color:var(--color-muted)">
      <i class="fa-solid fa-right-from-bracket w-4 text-center"></i> Logout
    </button>
  </div>
</aside>

<!-- ══════════════════════════════
     TOPBAR
══════════════════════════════ -->
<header id="topbar">
  <div class="flex items-center gap-3">
    <button class="lg:hidden w-9 h-9 rounded-xl border flex items-center justify-center"
            style="border-color:var(--color-border)" onclick="toggleSidebar()">
      <i class="fa-solid fa-bars text-sm" style="color:var(--color-muted)"></i>
    </button>
    <div>
      <h1 class="text-sm font-semibold">All Reports</h1>
      <p class="text-xs" style="color:var(--color-muted)">
        <span id="topbar-count">—</span> reports found
      </p>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <a href="/lab/upload/" class="btn-primary text-xs px-4 py-2">
      <i class="fa-solid fa-plus text-xs"></i>
      <span class="hidden sm:inline">New Report</span>
    </a>
    <button id="theme-toggle"
            class="w-9 h-9 rounded-xl border flex items-center justify-center"
            style="border-color:var(--color-border);color:var(--color-muted)">
      <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
    </button>
  </div>
</header>

<!-- ══════════════════════════════
     DETAIL PANEL
══════════════════════════════ -->
<div id="detail-panel">
  <div class="sticky top-0 z-10 flex items-center justify-between px-5 py-4"
       style="background:var(--color-surface);border-bottom:1px solid var(--color-border)">
    <h3 class="font-semibold text-sm">Report Details</h3>
    <button onclick="closeDetail()"
            class="w-8 h-8 rounded-lg border flex items-center justify-center
                   hover:text-red-500 transition-colors"
            style="border-color:var(--color-border);color:var(--color-muted)">
      <i class="fa-solid fa-xmark text-sm"></i>
    </button>
  </div>
  <div id="detail-content" class="p-5"></div>
</div>


<!-- ══════════════════════════════
     MAIN
══════════════════════════════ -->
<div class="main-content min-h-screen" id="main-wrap">
  <div class="p-6 max-w-7xl mx-auto">

    <!-- Stat strip -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5 fade-up">
      <div class="card p-4 flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:var(--color-primary)">
          <i class="fa-solid fa-file-waveform text-xs"></i>
        </div>
        <div>
          <div id="sc-total" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Total</div>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:var(--color-warning)">
          <i class="fa-solid fa-clock text-xs"></i>
        </div>
        <div>
          <div id="sc-pending" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Pending</div>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:var(--color-success)">
          <i class="fa-solid fa-circle-check text-xs"></i>
        </div>
        <div>
          <div id="sc-verified" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Verified</div>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:var(--color-error)">
          <i class="fa-solid fa-triangle-exclamation text-xs"></i>
        </div>
        <div>
          <div id="sc-urgent" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Urgent/Critical</div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row gap-3 mb-4 fade-up d1">
      <!-- Status tabs -->
      <div class="flex gap-2 flex-wrap">
        <button class="filter-tab active" onclick="setFilter('status','all',this)">All</button>
        <button class="filter-tab" onclick="setFilter('status','pending_review',this)">
          <i class="fa-solid fa-clock mr-1 text-[10px]"></i> Pending
        </button>
        <button class="filter-tab" onclick="setFilter('status','verified',this)">
          <i class="fa-solid fa-circle-check mr-1 text-[10px]"></i> Verified
        </button>
        <button class="filter-tab" onclick="setFilter('status','rejected',this)">
          <i class="fa-solid fa-ban mr-1 text-[10px]"></i> Rejected
        </button>
      </div>

      <!-- Right controls -->
      <div class="flex gap-2 ml-auto flex-wrap">
        <!-- Priority -->
        <select class="input-field text-xs" style="width:auto;padding:7px 10px"
                onchange="setFilter('priority',this.value)">
          <option value="all">All Priorities</option>
          <option value="normal">Normal</option>
          <option value="urgent">Urgent</option>
          <option value="critical">Critical</option>
        </select>

        <!-- Category -->
        <select class="input-field text-xs" style="width:auto;padding:7px 10px"
                onchange="setFilter('category',this.value)">
          <option value="all">All Categories</option>
          <option>Haematology</option>
          <option>Biochemistry</option>
          <option>Microbiology</option>
          <option>Pathology</option>
          <option>Radiology</option>
          <option>Cardiology</option>
          <option>Urine Analysis</option>
          <option>Immunology</option>
          <option>Other</option>
        </select>

        <!-- Date from -->
        <input type="date" class="input-field text-xs" style="padding:7px 10px"
               oninput="setFilter('dateFrom',this.value)" placeholder="From"/>

        <!-- Search -->
        <div class="relative">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2
                    text-xs" style="color:var(--color-muted)"></i>
          <input type="text" placeholder="Search patient, test…"
                 class="input-field pl-9 text-xs" style="width:180px"
                 oninput="setFilter('search',this.value)"/>
        </div>

        <!-- Export CSV -->
        <button onclick="exportCSV()"
                class="flex items-center gap-2 px-3 py-2 rounded-xl text-xs
                       font-semibold transition-colors"
                style="border:1.5px solid var(--color-border);color:var(--color-muted)">
          <i class="fa-solid fa-file-csv"></i>
          <span class="hidden sm:inline">Export</span>
        </button>
      </div>
    </div>

    <!-- Table card -->
    <div class="card fade-up d2" style="overflow:hidden">
      <div class="overflow-x-auto">
        <table class="reports-table">
          <thead>
            <tr>
              <th onclick="sortBy('patient')">
                Patient <i id="sort-patient" class="fa-solid fa-sort text-[10px] ml-1 opacity-40"></i>
              </th>
              <th onclick="sortBy('testName')" class="col-hide">
                Test <i id="sort-testName" class="fa-solid fa-sort text-[10px] ml-1 opacity-40"></i>
              </th>
              <th onclick="sortBy('category')" class="col-hide">
                Category <i id="sort-category" class="fa-solid fa-sort text-[10px] ml-1 opacity-40"></i>
              </th>
              <th onclick="sortBy('doctor')" class="col-hide">
                Doctor <i id="sort-doctor" class="fa-solid fa-sort text-[10px] ml-1 opacity-40"></i>
              </th>
              <th onclick="sortBy('uploadedAt')">
                Date <i id="sort-uploadedAt" class="fa-solid fa-sort text-[10px] ml-1 opacity-40"></i>
              </th>
              <th>Priority</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="reports-tbody">
            <tr>
              <td colspan="8" class="text-center py-10 text-sm"
                  style="color:var(--color-muted)">
                <i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Loading reports…
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex items-center justify-between px-5 py-3"
           style="border-top:1px solid var(--color-border)">
        <p id="page-info" class="text-xs" style="color:var(--color-muted)">—</p>
        <div id="pagination" class="flex gap-1.5"></div>
      </div>
    </div>

  </div>
</div>


<script type="module">
  import { auth, db }  from "../../assets/js/firebase-config.js";
  import { guardPage } from "../../assets/js/auth-guard.js";
  import { logActivity } from "../../assets/js/activity-logger.js";
  import {
    collection, query, where, getDocs,
    doc, getDoc, updateDoc, serverTimestamp,
    orderBy, limit
  } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

  let labUid      = "";
  let allReports  = [];
  let filtered    = [];
  let patientMap  = {};
  let doctorMap   = {};

  // Active filters
  let filters = { status:"all", priority:"all", category:"all", dateFrom:"", search:"" };
  let sortKey  = "uploadedAt";
  let sortDir  = "desc";

  // Pagination
  const PAGE_SIZE = 15;
  let currentPage = 1;

  // Selected report
  let selectedReportId = null;

  const COLORS  = ["#2563eb","#0ea5e9","#8b5cf6","#10b981","#f59e0b","#ec4899"];
  const avatarBg = n => COLORS[(n||"?").charCodeAt(0) % COLORS.length];

  const STATUS_CFG = {
    pending_review: { bg:"color-mix(in srgb,#f59e0b 12%,transparent)", color:"#f59e0b",      label:"Pending"  },
    verified:       { bg:"color-mix(in srgb,#10b981 12%,transparent)", color:"#10b981",      label:"Verified" },
    rejected:       { bg:"color-mix(in srgb,#ef4444 12%,transparent)", color:"#ef4444",      label:"Rejected" },
  };

  const PRIORITY_CFG = {
    normal:   { bg:"color-mix(in srgb,#64748b 10%,transparent)", color:"#64748b", label:"Normal"   },
    urgent:   { bg:"color-mix(in srgb,#f59e0b 12%,transparent)", color:"#f59e0b", label:"Urgent"   },
    critical: { bg:"color-mix(in srgb,#ef4444 12%,transparent)", color:"#ef4444", label:"Critical" },
  };

  // ── Theme ──────────────────────────────────────────────────────────
  const htmlEl = document.getElementById("html-root");
  function applyTheme(dark) {
    htmlEl.setAttribute("data-theme", dark ? "dark" : "light");
    document.getElementById("theme-icon").className =
      dark ? "fa-solid fa-sun text-sm" : "fa-solid fa-moon text-sm";
    localStorage.setItem("theme", dark ? "dark" : "light");
  }
  applyTheme(localStorage.getItem("theme") === "dark");
  document.getElementById("theme-toggle").addEventListener("click", () =>
    applyTheme(htmlEl.getAttribute("data-theme") !== "dark")
  );

  window.toggleSidebar = () => {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebar-overlay").classList.toggle("show");
  };

  // ── Settings ───────────────────────────────────────────────────────
  async function loadSettings() {
    try {
      const snap = await getDoc(doc(db,"settings","hospital"));
      if (!snap.exists()) return;
      const s = snap.data(); const t = s.theme || {};
      const r = document.documentElement;
      if (t.primary)    r.style.setProperty("--color-primary",      t.primary);
      if (t.primaryDark)r.style.setProperty("--color-primary-dark", t.primaryDark);
      if (t.secondary)  r.style.setProperty("--color-secondary",    t.secondary);
      if (t.fontFamily) r.style.setProperty("--font-family",        t.fontFamily);
      const sbName = document.getElementById("sb-hospital-name");
      if (sbName) sbName.textContent = s.hospitalName || "MediCore";
      if (s.logoUrl) {
        const img  = document.getElementById("sb-logo-img");
        const icon = document.getElementById("sb-logo-icon");
        if (img)  { img.src = s.logoUrl; img.classList.remove("hidden"); }
        if (icon) icon.classList.add("hidden");
      }
    } catch(e) { console.error(e); }
  }

  // ── Load all reports ───────────────────────────────────────────────
  async function loadReports() {
    try {
      const snap = await getDocs(query(
        collection(db,"reports"),
        where("uploadedBy","==", labUid),
        orderBy("uploadedAt","desc"),
        limit(500)
      ));
      allReports = snap.docs.map(d => ({ id:d.id, ...d.data() }));

      // Fetch patient + doctor names
      const pids = [...new Set(allReports.map(r => r.patientId).filter(Boolean))];
      const dids = [...new Set(allReports.map(r => r.doctorId).filter(Boolean))];

      const [ps, ds] = await Promise.all([
        Promise.all(pids.map(async id => {
          const s = await getDoc(doc(db,"users",id));
          return s.exists() ? { id, ...s.data() } : null;
        })),
        Promise.all(dids.map(async id => {
          const s = await getDoc(doc(db,"users",id));
          return s.exists() ? { id, ...s.data() } : null;
        }))
      ]);

      patientMap = Object.fromEntries(ps.filter(Boolean).map(p => [p.id, p]));
      doctorMap  = Object.fromEntries(ds.filter(Boolean).map(d => [d.id, d]));

      updateStatStrip();
      applyFiltersAndSort();

    } catch(e) {
      console.error("Load reports error:", e);
      document.getElementById("reports-tbody").innerHTML = `
        <tr><td colspan="8" class="text-center py-10 text-sm"
              style="color:var(--color-error)">
          <i class="fa-solid fa-circle-exclamation mr-2"></i>Failed to load reports.
        </td></tr>`;
    }
  }

  // ── Stat strip ─────────────────────────────────────────────────────
  function updateStatStrip() {
    document.getElementById("sc-total").textContent   = allReports.length;
    document.getElementById("sc-pending").textContent = allReports.filter(r => r.status === "pending_review").length;
    document.getElementById("sc-verified").textContent= allReports.filter(r => r.status === "verified").length;
    document.getElementById("sc-urgent").textContent  = allReports.filter(r => r.priority === "urgent" || r.priority === "critical").length;
  }

  // ── Filters & sort ─────────────────────────────────────────────────
  window.setFilter = function(key, val, btn) {
    filters[key] = val;
    if (btn) {
      // Only update status tab buttons
      if (key === "status") {
        document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      }
    }
    currentPage = 1;
    applyFiltersAndSort();
  };

  window.sortBy = function(key) {
    if (sortKey === key) {
      sortDir = sortDir === "asc" ? "desc" : "asc";
    } else {
      sortKey = key; sortDir = "asc";
    }
    // Reset sort icons
    ["patient","testName","category","doctor","uploadedAt"].forEach(k => {
      const el = document.getElementById(`sort-${k}`);
      if (el) el.className = "fa-solid fa-sort text-[10px] ml-1 opacity-40";
    });
    const icon = document.getElementById(`sort-${key}`);
    if (icon) icon.className =
      `fa-solid fa-sort-${sortDir === "asc" ? "up" : "down"} text-[10px] ml-1`;
    applyFiltersAndSort();
  };

  function applyFiltersAndSort() {
    let list = [...allReports];

    // Status filter
    if (filters.status !== "all")
      list = list.filter(r => r.status === filters.status);

    // Priority filter
    if (filters.priority !== "all")
      list = list.filter(r => r.priority === filters.priority);

    // Category filter
    if (filters.category !== "all")
      list = list.filter(r => r.category === filters.category);

    // Date from
    if (filters.dateFrom) {
      const from = new Date(filters.dateFrom);
      list = list.filter(r => {
        const d = r.uploadedAt?.toDate ? r.uploadedAt.toDate() : new Date(0);
        return d >= from;
      });
    }

    // Search
    if (filters.search) {
      const q = filters.search.toLowerCase();
      list = list.filter(r => {
        const pName = (patientMap[r.patientId]?.name || "").toLowerCase();
        const dName = (doctorMap[r.doctorId]?.name   || "").toLowerCase();
        const test  = (r.testName   || "").toLowerCase();
        const cat   = (r.category   || "").toLowerCase();
        return pName.includes(q) || dName.includes(q) ||
               test.includes(q)  || cat.includes(q);
      });
    }

    // Sort
    list.sort((a, b) => {
      let av, bv;
      if (sortKey === "patient") {
        av = (patientMap[a.patientId]?.name || "").toLowerCase();
        bv = (patientMap[b.patientId]?.name || "").toLowerCase();
      } else if (sortKey === "doctor") {
        av = (doctorMap[a.doctorId]?.name || "").toLowerCase();
        bv = (doctorMap[b.doctorId]?.name || "").toLowerCase();
      } else if (sortKey === "uploadedAt") {
        av = a.uploadedAt?.seconds || 0;
        bv = b.uploadedAt?.seconds || 0;
      } else {
        av = (a[sortKey] || "").toLowerCase();
        bv = (b[sortKey] || "").toLowerCase();
      }
      return sortDir === "asc"
        ? (av < bv ? -1 : av > bv ? 1 : 0)
        : (av > bv ? -1 : av < bv ? 1 : 0);
    });

    filtered = list;
    document.getElementById("topbar-count").textContent = filtered.length;
    renderTable();
    renderPagination();
  }

  // ── Render table ───────────────────────────────────────────────────
  function renderTable() {
    const tbody = document.getElementById("reports-tbody");
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);

    if (page.length === 0) {
      tbody.innerHTML = `
        <tr><td colspan="8" class="text-center py-12 text-sm"
              style="color:var(--color-muted)">
          <div class="w-12 h-12 rounded-2xl mx-auto mb-3 flex items-center
                      justify-center"
               style="background:color-mix(in srgb,var(--color-primary) 8%,transparent)">
            <i class="fa-solid fa-file-circle-xmark text-lg"
               style="color:var(--color-primary)"></i>
          </div>
          No reports match your filters.
        </td></tr>`;
      return;
    }

    tbody.innerHTML = page.map(r => {
      const patient  = patientMap[r.patientId];
      const doctor   = doctorMap[r.doctorId];
      const pName    = patient?.name || "Unknown";
      const dName    = doctor?.name  ? `Dr. ${doctor.name}` : "—";
      const ini      = pName.charAt(0).toUpperCase();
      const bg       = avatarBg(pName);
      const sc       = STATUS_CFG[r.status]   || STATUS_CFG.pending_review;
      const pc       = PRIORITY_CFG[r.priority] || PRIORITY_CFG.normal;
      const date     = r.uploadedAt?.toDate
        ? r.uploadedAt.toDate().toLocaleDateString("en-IN",{
            day:"2-digit", month:"short", year:"numeric"
          })
        : "—";

      return `
        <tr onclick="openDetail('${r.id}')"
            class="${selectedReportId === r.id ? 'bg-blue-50' : ''}">
          <td>
            <div class="flex items-center gap-2.5">
              <div class="avatar w-8 h-8 text-xs shrink-0" style="background:${bg}">${ini}</div>
              <div>
                <div class="font-medium">${pName}</div>
                <div class="text-[11px]" style="color:var(--color-muted)">
                  ${patient?.email || "—"}
                </div>
              </div>
            </div>
          </td>
          <td class="col-hide">
            <div class="font-medium">${r.testName || "—"}</div>
            ${r.fileName
              ? `<div class="text-[11px]" style="color:var(--color-muted)">
                   <i class="fa-regular fa-file mr-1"></i>${r.fileName}
                 </div>`
              : ""}
          </td>
          <td class="col-hide">
            <span class="text-xs px-2 py-0.5 rounded-lg font-medium"
                  style="background:color-mix(in srgb,var(--color-primary) 8%,transparent);
                         color:var(--color-primary)">
              ${r.category || "Other"}
            </span>
          </td>
          <td class="col-hide">
            <div class="flex items-center gap-2">
              <div class="avatar w-6 h-6 text-[10px] rounded-lg shrink-0"
                   style="background:${avatarBg(doctor?.name||'')}">
                ${(doctor?.name||"?").charAt(0).toUpperCase()}
              </div>
              <span class="truncate max-w-[100px]">${dName}</span>
            </div>
          </td>
          <td style="color:var(--color-muted)" class="text-xs">${date}</td>
          <td>
            <span class="status-badge"
                  style="background:${pc.bg};color:${pc.color}">
              ${pc.label}
            </span>
          </td>
          <td>
            <span class="status-badge"
                  style="background:${sc.bg};color:${sc.color}">
              ${sc.label}
            </span>
          </td>
          <td>
            <div class="flex items-center gap-1.5">
              ${r.fileUrl
                ? `<a href="${r.fileUrl}" target="_blank"
                      onclick="event.stopPropagation()"
                      class="w-7 h-7 rounded-lg flex items-center justify-center
                             transition-colors hover:text-blue-600"
                      style="border:1px solid var(--color-border);
                             color:var(--color-muted)"
                      title="View PDF">
                     <i class="fa-solid fa-file-pdf text-xs"></i>
                   </a>`
                : ""}
              <button onclick="event.stopPropagation();openDetail('${r.id}')"
                      class="w-7 h-7 rounded-lg flex items-center justify-center
                             transition-colors hover:text-blue-600"
                      style="border:1px solid var(--color-border);color:var(--color-muted)"
                      title="Details">
                <i class="fa-solid fa-arrow-right text-xs"></i>
              </button>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    // Page info
    const total = filtered.length;
    const from  = start + 1;
    const to    = Math.min(start + PAGE_SIZE, total);
    document.getElementById("page-info").textContent =
      `Showing ${from}–${to} of ${total} reports`;
  }

  // ── Pagination ─────────────────────────────────────────────────────
  function renderPagination() {
    const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    const pg = document.getElementById("pagination");
    if (totalPages <= 1) { pg.innerHTML = ""; return; }

    let html = `
      <button class="page-btn" ${currentPage===1?"disabled":""} onclick="goPage(${currentPage-1})">
        <i class="fa-solid fa-chevron-left text-[10px]"></i>
      </button>`;

    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages ||
          (i >= currentPage - 1 && i <= currentPage + 1)) {
        html += `<button class="page-btn ${i===currentPage?'active':''}"
                         onclick="goPage(${i})">${i}</button>`;
      } else if (i === currentPage - 2 || i === currentPage + 2) {
        html += `<span class="page-btn" style="cursor:default">…</span>`;
      }
    }

    html += `
      <button class="page-btn" ${currentPage===totalPages?"disabled":""} onclick="goPage(${currentPage+1})">
        <i class="fa-solid fa-chevron-right text-[10px]"></i>
      </button>`;

    pg.innerHTML = html;
  }

  window.goPage = function(n) {
    currentPage = n;
    renderTable();
    renderPagination();
    window.scrollTo({ top:0, behavior:"smooth" });
  };

  // ══════════════════════════════════════
  //  DETAIL PANEL
  // ══════════════════════════════════════

  window.openDetail = function(reportId) {
    selectedReportId = reportId;
    const r = allReports.find(x => x.id === reportId);
    if (!r) return;

    document.getElementById("detail-panel").classList.add("open");
    document.getElementById("main-wrap").style.paddingRight = "420px";

    renderDetailContent(r);
  };

  window.closeDetail = function() {
    selectedReportId = null;
    document.getElementById("detail-panel").classList.remove("open");
    document.getElementById("main-wrap").style.paddingRight = "";
  };

  function renderDetailContent(r) {
    const patient = patientMap[r.patientId];
    const doctor  = doctorMap[r.doctorId];
    const pName   = patient?.name || "Unknown";
    const dName   = doctor?.name  ? `Dr. ${doctor.name}` : "—";
    const ini     = pName.charAt(0).toUpperCase();
    const bg      = avatarBg(pName);
    const sc      = STATUS_CFG[r.status]     || STATUS_CFG.pending_review;
    const pc      = PRIORITY_CFG[r.priority] || PRIORITY_CFG.normal;

    const uploadDate = r.uploadedAt?.toDate
      ? r.uploadedAt.toDate().toLocaleString("en-IN",{
          day:"2-digit", month:"short", year:"numeric",
          hour:"2-digit", minute:"2-digit"
        })
      : "—";

    document.getElementById("detail-content").innerHTML = `

      <!-- Patient block -->
      <div class="flex items-center gap-3 p-4 rounded-2xl mb-5"
           style="background:color-mix(in srgb,var(--color-primary) 5%,transparent)">
        <div class="avatar w-12 h-12 rounded-2xl text-lg shrink-0"
             style="background:${bg}">${ini}</div>
        <div>
          <div class="font-bold text-sm">${pName}</div>
          <div class="text-xs mt-0.5" style="color:var(--color-muted)">
            ${patient?.email || "—"}
          </div>
          ${patient?.phone
            ? `<div class="text-xs" style="color:var(--color-muted)">
                 <i class="fa-solid fa-phone text-[9px] mr-1"></i>${patient.phone}
               </div>`
            : ""}
        </div>
      </div>

      <!-- Status + Priority -->
      <div class="flex gap-2 mb-5">
        <span class="status-badge flex-1 justify-center py-2"
              style="background:${sc.bg};color:${sc.color}">
          ${sc.label}
        </span>
        <span class="status-badge flex-1 justify-center py-2"
              style="background:${pc.bg};color:${pc.color}">
          <i class="fa-solid fa-flag text-[10px]"></i> ${pc.label}
        </span>
      </div>

      <!-- Report info -->
      <div class="card p-4 mb-4">
        <h4 class="text-xs font-semibold uppercase tracking-wider mb-3"
            style="color:var(--color-muted)">Report Info</h4>
        ${infoRow("Test Name",  r.testName   || "—")}
        ${infoRow("Category",   r.category   || "—")}
        ${infoRow("Test Date",  r.testDate   || "—")}
        ${infoRow("Doctor",     dName)}
        ${infoRow("Uploaded",   uploadDate)}
        ${infoRow("Report ID",  `<span class="font-mono text-[11px]">${r.id}</span>`)}
      </div>

      <!-- Lab notes -->
      ${r.labNotes
        ? `<div class="card p-4 mb-4">
             <h4 class="text-xs font-semibold uppercase tracking-wider mb-2"
                 style="color:var(--color-muted)">Lab Notes</h4>
             <p class="text-xs leading-relaxed" style="color:var(--color-text)">
               ${r.labNotes}
             </p>
           </div>`
        : ""}

      <!-- Doctor's notes (if verified) -->
      ${r.doctorNotes
        ? `<div class="card p-4 mb-4"
                style="border-color:color-mix(in srgb,var(--color-success) 25%,transparent)">
             <h4 class="text-xs font-semibold uppercase tracking-wider mb-2"
                 style="color:var(--color-success)">
               <i class="fa-solid fa-user-doctor mr-1"></i> Doctor's Notes
             </h4>
             <p class="text-xs leading-relaxed italic">"${r.doctorNotes}"</p>
           </div>`
        : ""}

      <!-- Actions -->
      <div class="space-y-2">
        ${r.fileUrl
          ? `<a href="${r.fileUrl}" target="_blank"
                class="w-full btn-primary justify-center py-2.5 text-xs">
               <i class="fa-solid fa-file-pdf"></i> View Report File
             </a>`
          : ""}

        <!-- Delete report -->
        <button onclick="deleteReport('${r.id}')"
                class="w-full flex items-center justify-center gap-2 px-4 py-2.5
                       rounded-xl text-xs font-semibold transition-colors"
                style="border:1.5px solid color-mix(in srgb,var(--color-error) 25%,transparent);
                       color:var(--color-error)">
          <i class="fa-solid fa-trash-can"></i> Delete Report
        </button>
      </div>
    `;
  }

  function infoRow(label, value) {
    return `
      <div class="flex justify-between items-start py-2"
           style="border-bottom:1px solid var(--color-border)">
        <span class="text-xs shrink-0 mr-4" style="color:var(--color-muted)">${label}</span>
        <span class="text-xs font-medium text-right">${value}</span>
      </div>`;
  }

  // ── Delete report ──────────────────────────────────────────────────
  window.deleteReport = async function(reportId) {
    if (!confirm("Delete this report? This cannot be undone.")) return;
    try {
      const { deleteDoc } = await import(
        "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js"
      );
      await deleteDoc(doc(db,"reports", reportId));
      allReports  = allReports.filter(r => r.id !== reportId);
      closeDetail();
      updateStatStrip();
      applyFiltersAndSort();
      showToast("Report deleted.", "info");
    } catch(e) {
      showToast("Delete failed: " + e.message, "error");
    }
  };

  // ── Export CSV ─────────────────────────────────────────────────────
  window.exportCSV = function() {
    const headers = ["Patient","Email","Test","Category","Doctor","Date","Priority","Status"];
    const rows    = filtered.map(r => {
      const p    = patientMap[r.patientId];
      const d    = doctorMap[r.doctorId];
      const date = r.uploadedAt?.toDate
        ? r.uploadedAt.toDate().toLocaleDateString("en-IN")
        : "";
      return [
        p?.name  || "",
        p?.email || "",
        r.testName   || "",
        r.category   || "",
        d?.name ? `Dr. ${d.name}` : "",
        date,
        r.priority   || "",
        r.status     || "",
      ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(",");
    });

    const csv  = [headers.join(","), ...rows].join("\n");
    const blob = new Blob([csv], { type:"text/csv" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `lab_reports_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("CSV exported!", "success");
  };

  // ── Toast ──────────────────────────────────────────────────────────
  window.showToast = function(msg, type = "info") {
    const toast = document.getElementById("toast");
    const icons = {
      success:"fa-solid fa-circle-check",
      error:"fa-solid fa-circle-exclamation",
      info:"fa-solid fa-circle-info"
    };
    document.getElementById("toast-msg").textContent = msg;
    document.getElementById("toast-icon").className  = icons[type];
    toast.className = `show ${type}`;
    clearTimeout(window._tt);
    window._tt = setTimeout(() => { toast.className = type; }, 3500);
  };

  // ── Logout ─────────────────────────────────────────────────────────
  window.labLogout = async function() {
    await signOut(auth);
    window.location.href = "/auth/staff-login/?role=lab";
  };

  // ── Init ───────────────────────────────────────────────────────────
  guardPage(["lab"], async (user, userData) => {
    labUid = user.uid;
    document.getElementById("sb-lab-name").textContent  = userData.name  || "Lab Staff";
    document.getElementById("sb-lab-email").textContent = userData.email || user.email || "—";

    await loadSettings();
    await loadReports();

    const loader = document.getElementById("page-loader");
    loader.classList.add("hidden");
    setTimeout(() => loader.remove(), 500);
  });

</script>
</body>
