<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patients — Lab</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --color-primary:      #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-secondary:    #0ea5e9;
      --color-bg:           #f8fafc;
      --color-surface:      #ffffff;
      --color-text:         #0f172a;
      --color-muted:        #64748b;
      --color-border:       #e2e8f0;
      --color-success:      #10b981;
      --color-warning:      #f59e0b;
      --color-error:        #ef4444;
      --font-family:        'Inter', sans-serif;
    }
    [data-theme="dark"] {
      --color-bg:      #0f172a;
      --color-surface: #1e293b;
      --color-text:    #f1f5f9;
      --color-muted:   #94a3b8;
      --color-border:  #334155;
    }
    * { font-family:var(--font-family); box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--color-bg); color:var(--color-text); transition:background 0.3s,color 0.3s; }

    .main-content { margin-left:0; padding-top:64px; }
    @media(min-width:1024px) { .main-content { margin-left:260px; } }

    #page-loader {
      position:fixed; inset:0; z-index:9999; background:var(--color-bg);
      display:flex; align-items:center; justify-content:center; transition:opacity 0.4s;
    }
    #page-loader.hidden { opacity:0; pointer-events:none; }
    .spinner {
      width:36px; height:36px; border:3px solid var(--color-border);
      border-top-color:var(--color-primary); border-radius:50%;
      animation:spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg) } }

    .card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:1rem; }

    /* Sidebar */
    #sidebar {
      position:fixed; top:0; left:0; height:100%; width:260px; z-index:40;
      background:var(--color-surface); border-right:1px solid var(--color-border);
      display:flex; flex-direction:column;
      transform:translateX(-100%); transition:transform 0.3s;
    }
    #sidebar.open { transform:translateX(0); }
    @media(min-width:1024px) { #sidebar { transform:translateX(0); } }
    #sidebar-overlay {
      position:fixed; inset:0; z-index:30;
      background:rgba(0,0,0,0.4); backdrop-filter:blur(3px); display:none;
    }
    #sidebar-overlay.show { display:block; }
    .nav-link {
      display:flex; align-items:center; gap:12px; padding:10px 14px;
      border-radius:12px; font-size:0.85rem; font-weight:500;
      color:var(--color-muted); text-decoration:none; transition:all 0.15s;
    }
    .nav-link:hover  { background:color-mix(in srgb,var(--color-primary) 8%,transparent); color:var(--color-primary); }
    .nav-link.active { background:color-mix(in srgb,var(--color-primary) 12%,transparent); color:var(--color-primary); font-weight:600; }
    .nav-link i { width:18px; text-align:center; }

    /* Topbar */
    #topbar {
      position:fixed; top:0; right:0; left:0; z-index:20; height:64px;
      background:var(--color-surface); border-bottom:1px solid var(--color-border);
      display:flex; align-items:center; justify-content:space-between; padding:0 20px;
    }
    @media(min-width:1024px) { #topbar { left:260px; } }

    /* Filter tab */
    .filter-tab {
      padding:7px 16px; border-radius:10px; font-size:0.8rem; font-weight:500;
      cursor:pointer; border:1.5px solid var(--color-border);
      color:var(--color-muted); background:var(--color-surface);
      transition:all 0.15s; white-space:nowrap;
    }
    .filter-tab:hover  { border-color:var(--color-primary); color:var(--color-primary); }
    .filter-tab.active {
      background:color-mix(in srgb,var(--color-primary) 10%,transparent);
      border-color:var(--color-primary); color:var(--color-primary);
    }

    /* Avatar */
    .avatar {
      display:flex; align-items:center; justify-content:center;
      font-weight:700; color:#fff; flex-shrink:0;
    }

    /* Patient card */
    .patient-card {
      background:var(--color-surface); border:1.5px solid var(--color-border);
      border-radius:14px; padding:16px; cursor:pointer;
      transition:border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .patient-card:hover {
      border-color:var(--color-primary);
      box-shadow:0 6px 20px rgba(0,0,0,0.07);
      transform:translateY(-2px);
    }
    .patient-card.selected {
      border-color:var(--color-primary);
      background:color-mix(in srgb,var(--color-primary) 3%,transparent);
    }

    /* Status badge */
    .status-badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:3px 9px; border-radius:99px; font-size:0.7rem; font-weight:600;
    }

    /* Input */
    .input-field {
      padding:9px 14px; background:var(--color-bg);
      border:1.5px solid var(--color-border); border-radius:10px;
      color:var(--color-text); font-size:0.85rem; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color:var(--color-primary);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--color-primary) 15%,transparent);
    }

    /* Detail panel */
    #detail-panel {
      position:fixed; top:64px; right:0; bottom:0; width:400px; z-index:30;
      background:var(--color-surface); border-left:1px solid var(--color-border);
      overflow-y:auto; transform:translateX(100%); transition:transform 0.3s;
    }
    #detail-panel.open { transform:translateX(0); }
    @media(max-width:1280px) {
      #detail-panel { width:100%; top:0; z-index:50; border-left:none; }
    }

    /* Panel tab */
    .panel-tab {
      flex:1; padding:9px; text-align:center; font-size:0.8rem; font-weight:500;
      border-bottom:2px solid transparent; color:var(--color-muted);
      cursor:pointer; background:none; border-top:none; border-left:none;
      border-right:none; transition:all 0.15s;
    }
    .panel-tab.active { color:var(--color-primary); border-bottom-color:var(--color-primary); }

    /* Btn */
    .btn-primary {
      padding:9px 18px; background:var(--color-primary); color:#fff;
      font-size:0.83rem; font-weight:600; border:none; border-radius:10px;
      cursor:pointer; display:inline-flex; align-items:center; gap:8px;
      transition:background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background:var(--color-primary-dark); transform:translateY(-1px); }

    /* Toast */
    #toast {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(70px);
      padding:11px 20px; border-radius:12px; font-size:0.85rem; font-weight:500;
      display:flex; align-items:center; gap:10px; z-index:9999; opacity:0;
      white-space:nowrap;
      transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      box-shadow:0 8px 24px rgba(0,0,0,0.15);
    }
    #toast.show    { transform:translateX(-50%) translateY(0); opacity:1; }
    #toast.success { background:var(--color-success); color:#fff; }
    #toast.error   { background:var(--color-error);   color:#fff; }
    #toast.info    { background:var(--color-primary);  color:#fff; }

    .fade-up    { animation:fadeUp 0.5s ease forwards; opacity:0; }
    .fade-up.d1 { animation-delay:0.1s; }
    .fade-up.d2 { animation-delay:0.2s; }
    .fade-up.d3 { animation-delay:0.3s; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>

<div id="page-loader"><div class="spinner"></div></div>
<div id="toast"><i id="toast-icon"></i><span id="toast-msg"></span></div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- ══════════════════════════════ SIDEBAR ══════════════════════════════ -->
<aside id="sidebar">
  <div class="flex items-center gap-3 px-5 py-5"
       style="border-bottom:1px solid var(--color-border)">
    <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white
                text-sm font-bold shrink-0 overflow-hidden"
         style="background:var(--color-primary)">
      <img id="sb-logo-img" src="" alt="" class="w-full h-full object-cover hidden"/>
      <i id="sb-logo-icon" class="fa-solid fa-hospital text-sm"></i>
    </div>
    <div>
      <div id="sb-hospital-name" class="text-sm font-semibold">MediCore</div>
      <div class="text-xs" style="color:var(--color-muted)">Lab Portal</div>
    </div>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <a href="/lab/dashboard/" class="nav-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
    <a href="/lab/reports/"   class="nav-link"><i class="fa-solid fa-file-waveform"></i> All Reports</a>
    <a href="/lab/upload/"    class="nav-link"><i class="fa-solid fa-file-arrow-up"></i> Upload Report</a>
    <a href="/lab/patients/"  class="nav-link active"><i class="fa-solid fa-users"></i> Patients</a>
    <div class="pt-3 pb-1 px-3">
      <p class="text-[10px] font-semibold uppercase tracking-wider"
         style="color:var(--color-muted)">Account</p>
    </div>
    <a href="/lab/profile/"   class="nav-link"><i class="fa-solid fa-circle-user"></i> My Profile</a>
  </nav>
  <div class="px-3 py-4" style="border-top:1px solid var(--color-border)">
    <div class="flex items-center gap-3 px-3 py-2.5 rounded-xl mb-1"
         style="background:color-mix(in srgb,var(--color-primary) 6%,transparent)">
      <div class="w-8 h-8 rounded-xl flex items-center justify-center text-white text-xs shrink-0"
           style="background:var(--color-primary)">
        <i class="fa-solid fa-flask text-xs"></i>
      </div>
      <div class="overflow-hidden">
        <div id="sb-lab-name"  class="text-xs font-semibold truncate">Lab Staff</div>
        <div id="sb-lab-email" class="text-xs truncate" style="color:var(--color-muted)">—</div>
      </div>
    </div>
    <button onclick="labLogout()"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl
                   text-sm transition-colors hover:text-red-500"
            style="color:var(--color-muted)">
      <i class="fa-solid fa-right-from-bracket w-4 text-center"></i> Logout
    </button>
  </div>
</aside>

<!-- ══════════════════════════════ TOPBAR ══════════════════════════════ -->
<header id="topbar">
  <div class="flex items-center gap-3">
    <button class="lg:hidden w-9 h-9 rounded-xl border flex items-center justify-center"
            style="border-color:var(--color-border)" onclick="toggleSidebar()">
      <i class="fa-solid fa-bars text-sm" style="color:var(--color-muted)"></i>
    </button>
    <div>
      <h1 class="text-sm font-semibold">Patients</h1>
      <p class="text-xs" style="color:var(--color-muted)">
        <span id="topbar-count">—</span> patients with lab reports
      </p>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <a href="/lab/upload/" class="btn-primary text-xs px-4 py-2">
      <i class="fa-solid fa-file-arrow-up text-xs"></i>
      <span class="hidden sm:inline">New Report</span>
    </a>
    <button id="theme-toggle"
            class="w-9 h-9 rounded-xl border flex items-center justify-center"
            style="border-color:var(--color-border);color:var(--color-muted)">
      <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
    </button>
  </div>
</header>

<!-- ══════════════════════════════ DETAIL PANEL ══════════════════════════════ -->
<div id="detail-panel">
  <div class="sticky top-0 z-10 flex items-center justify-between px-5 py-4"
       style="background:var(--color-surface);border-bottom:1px solid var(--color-border)">
    <h3 class="font-semibold text-sm">Patient Reports</h3>
    <button onclick="closeDetail()"
            class="w-8 h-8 rounded-lg border flex items-center justify-center
                   hover:text-red-500 transition-colors"
            style="border-color:var(--color-border);color:var(--color-muted)">
      <i class="fa-solid fa-xmark text-sm"></i>
    </button>
  </div>

  <!-- Panel tabs -->
  <div class="flex" style="border-bottom:1px solid var(--color-border)">
    <button class="panel-tab active" onclick="switchPanelTab('overview',this)">
      <i class="fa-solid fa-circle-user mr-1.5"></i>Overview
    </button>
    <button class="panel-tab" onclick="switchPanelTab('reports',this)">
      <i class="fa-solid fa-file-waveform mr-1.5"></i>Reports
    </button>
    <button class="panel-tab" onclick="switchPanelTab('timeline',this)">
      <i class="fa-solid fa-timeline mr-1.5"></i>Timeline
    </button>
  </div>

  <div id="panel-body" class="p-5"></div>
</div>

<!-- ══════════════════════════════ MAIN ══════════════════════════════ -->
<div class="main-content min-h-screen" id="main-wrap">
  <div class="p-6 max-w-7xl mx-auto">

    <!-- Stat cards -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5 fade-up">
      <div class="card p-4 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:var(--color-primary)">
          <i class="fa-solid fa-users text-sm"></i>
        </div>
        <div>
          <div id="sc-total" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Total Patients</div>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:var(--color-success)">
          <i class="fa-solid fa-calendar-check text-sm"></i>
        </div>
        <div>
          <div id="sc-recent" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Active (30 days)</div>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:var(--color-warning)">
          <i class="fa-solid fa-clock text-sm"></i>
        </div>
        <div>
          <div id="sc-pending" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Pending Reports</div>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:#8b5cf6">
          <i class="fa-solid fa-file-waveform text-sm"></i>
        </div>
        <div>
          <div id="sc-reports" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Total Reports</div>
        </div>
      </div>
    </div>

    <!-- Filters + Search -->
    <div class="flex flex-col sm:flex-row gap-3 mb-5 fade-up d1">
      <div class="flex gap-2 flex-wrap">
        <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
        <button class="filter-tab" onclick="setFilter('recent',this)">
          <i class="fa-solid fa-clock-rotate-left mr-1 text-[10px]"></i>Recent
        </button>
        <button class="filter-tab" onclick="setFilter('pending',this)">
          <i class="fa-solid fa-clock mr-1 text-[10px]"></i>Has Pending
        </button>
        <button class="filter-tab" onclick="setFilter('critical',this)">
          <i class="fa-solid fa-triangle-exclamation mr-1 text-[10px]"></i>Has Critical
        </button>
      </div>
      <div class="relative flex-1 sm:max-w-xs ml-auto">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2
                  text-xs" style="color:var(--color-muted)"></i>
        <input type="text" placeholder="Search by name, email…"
               class="input-field pl-9 w-full" oninput="searchPatients(this.value)"/>
      </div>
    </div>

    <!-- Patient grid -->
    <div id="patient-grid"
         class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 fade-up d2">
    </div>

  </div>
</div>


<script type="module">
  import { auth, db }  from "../../assets/js/firebase-config.js";
  import { guardPage } from "../../assets/js/auth-guard.js";
  import {
    collection, query, where, getDocs,
    doc, getDoc, orderBy, limit
  } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

  let labUid      = "";
  let allPatients = [];   // enriched patient objects
  let filtered    = [];
  let allReports  = [];
  let activeFilter= "all";
  let activeSearch= "";
  let selectedPid = null;
  let activePanelTab = "overview";

  const COLORS   = ["#2563eb","#0ea5e9","#8b5cf6","#10b981","#f59e0b","#ec4899"];
  const avatarBg = n => COLORS[(n||"?").charCodeAt(0) % COLORS.length];

  const STATUS_CFG = {
    pending_review:{ bg:"color-mix(in srgb,#f59e0b 12%,transparent)", color:"#f59e0b", label:"Pending"  },
    verified:      { bg:"color-mix(in srgb,#10b981 12%,transparent)", color:"#10b981", label:"Verified" },
    rejected:      { bg:"color-mix(in srgb,#ef4444 12%,transparent)", color:"#ef4444", label:"Rejected" },
  };

  const PRIORITY_CFG = {
    normal:  { color:"#64748b" },
    urgent:  { color:"#f59e0b" },
    critical:{ color:"#ef4444" },
  };

  // ── Theme ──────────────────────────────────────────────────────────
  const htmlEl = document.getElementById("html-root");
  function applyTheme(dark) {
    htmlEl.setAttribute("data-theme", dark ? "dark" : "light");
    document.getElementById("theme-icon").className =
      dark ? "fa-solid fa-sun text-sm" : "fa-solid fa-moon text-sm";
    localStorage.setItem("theme", dark ? "dark" : "light");
  }
  applyTheme(localStorage.getItem("theme") === "dark");
  document.getElementById("theme-toggle").addEventListener("click", () =>
    applyTheme(htmlEl.getAttribute("data-theme") !== "dark")
  );

  window.toggleSidebar = () => {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebar-overlay").classList.toggle("show");
  };

  // ── Settings ───────────────────────────────────────────────────────
  async function loadSettings() {
    try {
      const snap = await getDoc(doc(db,"settings","hospital"));
      if (!snap.exists()) return;
      const s = snap.data(); const t = s.theme || {};
      const r = document.documentElement;
      if (t.primary)    r.style.setProperty("--color-primary",      t.primary);
      if (t.primaryDark)r.style.setProperty("--color-primary-dark", t.primaryDark);
      if (t.secondary)  r.style.setProperty("--color-secondary",    t.secondary);
      if (t.fontFamily) r.style.setProperty("--font-family",        t.fontFamily);
      const sbName = document.getElementById("sb-hospital-name");
      if (sbName) sbName.textContent = s.hospitalName || "MediCore";
      if (s.logoUrl) {
        const img  = document.getElementById("sb-logo-img");
        const icon = document.getElementById("sb-logo-icon");
        if (img)  { img.src = s.logoUrl; img.classList.remove("hidden"); }
        if (icon) icon.classList.add("hidden");
      }
    } catch(e) { console.error(e); }
  }

  // ── Load data ──────────────────────────────────────────────────────
  async function loadData() {
    try {
      // 1. Fetch all reports uploaded by this lab user
      const repSnap = await getDocs(query(
        collection(db,"reports"),
        where("uploadedBy","==", labUid)
      ));
      allReports = repSnap.docs.map(d => ({ id:d.id, ...d.data() }));

      // 2. Unique patient IDs
      const pids = [...new Set(allReports.map(r => r.patientId).filter(Boolean))];

      // 3. Fetch patient profiles
      const patientDocs = await Promise.all(pids.map(async pid => {
        try {
          const s = await getDoc(doc(db,"users",pid));
          return s.exists() ? { id:pid, ...s.data() } : null;
        } catch(_) { return null; }
      }));

      // 4. Enrich each patient with report stats
      allPatients = patientDocs.filter(Boolean).map(p => {
        const reports = allReports.filter(r => r.patientId === p.id);
        const sorted  = [...reports].sort((a,b) =>
          (b.uploadedAt?.seconds||0) - (a.uploadedAt?.seconds||0)
        );
        return {
          ...p,
          reportCount:    reports.length,
          pendingCount:   reports.filter(r => r.status === "pending_review").length,
          verifiedCount:  reports.filter(r => r.status === "verified").length,
          criticalCount:  reports.filter(r => r.priority === "critical").length,
          urgentCount:    reports.filter(r => r.priority === "urgent").length,
          lastReport:     sorted[0]?.uploadedAt || null,
          lastTestName:   sorted[0]?.testName   || null,
        };
      });

      // Sort by last report date desc
      allPatients.sort((a,b) =>
        (b.lastReport?.seconds||0) - (a.lastReport?.seconds||0)
      );

      updateStats();
      applyFilters();

    } catch(e) {
      console.error("Load data error:", e);
      document.getElementById("patient-grid").innerHTML = `
        <div class="col-span-full p-8 text-center text-sm card"
             style="color:var(--color-error)">
          <i class="fa-solid fa-circle-exclamation mr-2"></i>
          Failed to load patients.
        </div>`;
    }
  }

  // ── Stat cards ─────────────────────────────────────────────────────
  function updateStats() {
    const now   = new Date();
    const ago30 = new Date(now - 30 * 86400000);

    document.getElementById("sc-total").textContent   = allPatients.length;
    document.getElementById("sc-reports").textContent = allReports.length;
    document.getElementById("sc-pending").textContent =
      allReports.filter(r => r.status === "pending_review").length;

    const recent = allPatients.filter(p =>
      p.lastReport?.toDate ? p.lastReport.toDate() >= ago30 : false
    );
    document.getElementById("sc-recent").textContent = recent.length;
    document.getElementById("topbar-count").textContent = allPatients.length;
  }

  // ── Filters ────────────────────────────────────────────────────────
  window.setFilter = function(type, btn) {
    activeFilter = type;
    document.querySelectorAll(".filter-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    applyFilters();
  };

  window.searchPatients = function(val) {
    activeSearch = val.toLowerCase();
    applyFilters();
  };

  function applyFilters() {
    let list = [...allPatients];
    const now   = new Date();
    const ago30 = new Date(now - 30 * 86400000);

    if (activeFilter === "recent") {
      list = list.filter(p =>
        p.lastReport?.toDate ? p.lastReport.toDate() >= ago30 : false
      );
    } else if (activeFilter === "pending") {
      list = list.filter(p => p.pendingCount > 0);
    } else if (activeFilter === "critical") {
      list = list.filter(p => p.criticalCount > 0);
    }

    if (activeSearch) {
      list = list.filter(p =>
        (p.name  ||"").toLowerCase().includes(activeSearch) ||
        (p.email ||"").toLowerCase().includes(activeSearch) ||
        (p.phone ||"").includes(activeSearch)
      );
    }

    filtered = list;
    renderGrid();
  }

  // ── Render patient grid ────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById("patient-grid");

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="col-span-full card p-10 text-center">
          <div class="w-14 h-14 rounded-2xl mx-auto mb-3 flex items-center justify-center"
               style="background:color-mix(in srgb,var(--color-primary) 8%,transparent)">
            <i class="fa-solid fa-user-slash text-xl"
               style="color:var(--color-primary)"></i>
          </div>
          <p class="font-semibold text-sm">No patients found</p>
          <p class="text-xs mt-1" style="color:var(--color-muted)">
            Patients appear here after reports are uploaded for them.
          </p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const bg   = avatarBg(p.name||"");
      const ini  = (p.name||"?").charAt(0).toUpperCase();
      const last = p.lastReport?.toDate
        ? p.lastReport.toDate().toLocaleDateString("en-IN",{
            day:"2-digit", month:"short", year:"numeric"
          })
        : "—";

      // Mini status bar: ratio of verified vs pending
      const total   = p.reportCount || 1;
      const verPct  = Math.round((p.verifiedCount / total) * 100);
      const pendPct = Math.round((p.pendingCount  / total) * 100);

      return `
        <div class="patient-card ${selectedPid === p.id ? 'selected' : ''}"
             onclick="openDetail('${p.id}')">

          <!-- Header -->
          <div class="flex items-start gap-3 mb-3">
            <div class="avatar w-11 h-11 rounded-xl text-sm shrink-0"
                 style="background:${bg}">${ini}</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-sm truncate">${p.name||"—"}</div>
              <div class="text-xs truncate mt-0.5" style="color:var(--color-muted)">
                ${p.email||"—"}
              </div>
            </div>
            <!-- Alert badges -->
            <div class="flex flex-col gap-1 items-end shrink-0">
              ${p.criticalCount > 0
                ? `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded"
                        style="background:color-mix(in srgb,#ef4444 12%,transparent);color:#ef4444">
                     !! CRITICAL
                   </span>`
                : p.urgentCount > 0
                  ? `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded"
                          style="background:color-mix(in srgb,#f59e0b 12%,transparent);color:#f59e0b">
                       ! URGENT
                     </span>`
                  : ""}
            </div>
          </div>

          <!-- Report mini-stats -->
          <div class="grid grid-cols-3 gap-1.5 mb-3">
            <div class="text-center p-2 rounded-xl"
                 style="background:var(--color-bg)">
              <div class="font-bold text-sm"
                   style="color:var(--color-primary)">${p.reportCount}</div>
              <div class="text-[10px]" style="color:var(--color-muted)">Total</div>
            </div>
            <div class="text-center p-2 rounded-xl"
                 style="background:var(--color-bg)">
              <div class="font-bold text-sm"
                   style="color:var(--color-success)">${p.verifiedCount}</div>
              <div class="text-[10px]" style="color:var(--color-muted)">Verified</div>
            </div>
            <div class="text-center p-2 rounded-xl"
                 style="background:var(--color-bg)">
              <div class="font-bold text-sm"
                   style="color:var(--color-warning)">${p.pendingCount}</div>
              <div class="text-[10px]" style="color:var(--color-muted)">Pending</div>
            </div>
          </div>

          <!-- Progress bar -->
          <div class="h-1.5 rounded-full overflow-hidden mb-3"
               style="background:var(--color-border)">
            <div class="h-full rounded-full"
                 style="width:${verPct}%;background:var(--color-success);
                        transition:width 0.5s"></div>
          </div>

          <!-- Footer -->
          <div class="flex items-center justify-between pt-2.5"
               style="border-top:1px solid var(--color-border)">
            <div class="text-xs" style="color:var(--color-muted)">
              <i class="fa-regular fa-calendar text-[10px] mr-1"></i>
              ${last}
            </div>
            <span class="text-xs font-medium" style="color:var(--color-primary)">
              View <i class="fa-solid fa-arrow-right text-[9px]"></i>
            </span>
          </div>
        </div>
      `;
    }).join('');
  }

  // ══════════════════════════════════════
  //  DETAIL PANEL
  // ══════════════════════════════════════

  window.openDetail = function(pid) {
    selectedPid    = pid;
    activePanelTab = "overview";

    // Reset tabs
    document.querySelectorAll(".panel-tab").forEach((b,i) =>
      b.classList.toggle("active", i === 0)
    );

    document.getElementById("detail-panel").classList.add("open");
    document.getElementById("main-wrap").style.paddingRight = "420px";

    renderGrid(); // re-render to show selected state
    renderPanelTab();
  };

  window.closeDetail = function() {
    selectedPid = null;
    document.getElementById("detail-panel").classList.remove("open");
    document.getElementById("main-wrap").style.paddingRight = "";
    renderGrid();
  };

  window.switchPanelTab = function(tab, btn) {
    activePanelTab = tab;
    document.querySelectorAll(".panel-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderPanelTab();
  };

  function renderPanelTab() {
    const p = allPatients.find(x => x.id === selectedPid);
    if (!p) return;
    const body = document.getElementById("panel-body");

    if      (activePanelTab === "overview")  body.innerHTML = renderOverview(p);
    else if (activePanelTab === "reports")   body.innerHTML = renderReportList(p);
    else if (activePanelTab === "timeline")  body.innerHTML = renderTimeline(p);
  }

  // ── Overview ───────────────────────────────────────────────────────
  function renderOverview(p) {
    const bg  = avatarBg(p.name||"");
    const ini = (p.name||"?").charAt(0).toUpperCase();
    const total   = p.reportCount || 1;
    const verPct  = Math.round((p.verifiedCount / total) * 100);

    return `
      <!-- Avatar hero -->
      <div class="flex items-center gap-4 p-4 rounded-2xl mb-4"
           style="background:color-mix(in srgb,var(--color-primary) 5%,transparent)">
        <div class="avatar w-16 h-16 rounded-2xl text-xl shrink-0"
             style="background:${bg}">${ini}</div>
        <div>
          <div class="font-bold text-base">${p.name||"—"}</div>
          <div class="text-xs mt-0.5" style="color:var(--color-muted)">${p.email||"—"}</div>
          ${p.phone
            ? `<div class="text-xs mt-0.5" style="color:var(--color-muted)">
                 <i class="fa-solid fa-phone text-[9px] mr-1"></i>${p.phone}
               </div>`
            : ""}
        </div>
      </div>

      <!-- Stats row -->
      <div class="grid grid-cols-3 gap-2 mb-4">
        <div class="card p-3 text-center">
          <div class="font-bold text-lg" style="color:var(--color-primary)">${p.reportCount}</div>
          <div class="text-[10px]" style="color:var(--color-muted)">Reports</div>
        </div>
        <div class="card p-3 text-center">
          <div class="font-bold text-lg" style="color:var(--color-success)">${p.verifiedCount}</div>
          <div class="text-[10px]" style="color:var(--color-muted)">Verified</div>
        </div>
        <div class="card p-3 text-center">
          <div class="font-bold text-lg" style="color:var(--color-warning)">${p.pendingCount}</div>
          <div class="text-[10px]" style="color:var(--color-muted)">Pending</div>
        </div>
      </div>

      <!-- Completion bar -->
      <div class="card p-4 mb-4">
        <div class="flex justify-between text-xs mb-2">
          <span style="color:var(--color-muted)">Report completion</span>
          <span class="font-semibold" style="color:var(--color-success)">${verPct}%</span>
        </div>
        <div class="h-2 rounded-full" style="background:var(--color-border)">
          <div class="h-full rounded-full"
               style="width:${verPct}%;background:var(--color-success)"></div>
        </div>
      </div>

      <!-- Patient info -->
      <div class="card p-4 mb-4">
        <h4 class="text-xs font-semibold uppercase tracking-wider mb-3"
            style="color:var(--color-muted)">Patient Info</h4>
        ${infoRow("Age",        p.age     ? `${p.age} years` : "—")}
        ${infoRow("Gender",     p.gender  || "—")}
        ${infoRow("Blood Group",p.blood   || "—")}
        ${infoRow("Address",    p.address || "—")}
        ${infoRow("Patient ID", `<span class="font-mono text-[11px]">${p.id}</span>`)}
      </div>

      <!-- Alert badges -->
      ${p.criticalCount > 0
        ? `<div class="rounded-xl p-3 mb-3 flex items-center gap-2"
                style="background:color-mix(in srgb,#ef4444 8%,transparent);
                       border:1px solid color-mix(in srgb,#ef4444 20%,transparent)">
             <i class="fa-solid fa-skull-crossbones text-sm" style="color:#ef4444"></i>
             <span class="text-xs font-semibold" style="color:#ef4444">
               ${p.criticalCount} critical report${p.criticalCount > 1 ? "s" : ""} — review urgently
             </span>
           </div>`
        : ""}

      <!-- Quick actions -->
      <a href="/lab/upload/?patient=${p.id}"
         class="w-full btn-primary justify-center text-xs py-2.5">
        <i class="fa-solid fa-file-arrow-up"></i> Upload New Report
      </a>
    `;
  }

  // ── Report list ────────────────────────────────────────────────────
  function renderReportList(p) {
    const reports = allReports
      .filter(r => r.patientId === p.id)
      .sort((a,b) => (b.uploadedAt?.seconds||0) - (a.uploadedAt?.seconds||0));

    if (reports.length === 0) return emptyState("fa-file-circle-xmark", "No reports yet");

    return reports.map(r => {
      const sc  = STATUS_CFG[r.status]     || STATUS_CFG.pending_review;
      const pc  = PRIORITY_CFG[r.priority] || PRIORITY_CFG.normal;
      const date= r.uploadedAt?.toDate
        ? r.uploadedAt.toDate().toLocaleDateString("en-IN",{
            day:"2-digit", month:"short", year:"numeric"
          })
        : "—";

      return `
        <div class="py-3" style="border-bottom:1px solid var(--color-border)">
          <div class="flex items-start justify-between gap-2">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-1.5 flex-wrap">
                <span class="font-medium text-sm truncate">${r.testName||"Lab Report"}</span>
                ${r.priority && r.priority !== "normal"
                  ? `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded"
                          style="color:${pc.color};
                                 background:color-mix(in srgb,${pc.color} 12%,transparent)">
                       ${r.priority.toUpperCase()}
                     </span>`
                  : ""}
              </div>
              <div class="text-xs mt-0.5" style="color:var(--color-muted)">
                ${r.category||"Other"} · ${date}
              </div>
              ${r.labNotes
                ? `<div class="text-xs mt-1 italic truncate"
                        style="color:var(--color-muted)">"${r.labNotes}"</div>`
                : ""}
            </div>
            <div class="flex flex-col items-end gap-1.5 shrink-0">
              <span class="status-badge"
                    style="background:${sc.bg};color:${sc.color}">
                ${sc.label}
              </span>
              ${r.fileUrl
                ? `<a href="${r.fileUrl}" target="_blank"
                      class="text-xs font-medium hover:underline"
                      style="color:var(--color-primary)">
                     <i class="fa-solid fa-file-pdf mr-1"></i>PDF
                   </a>`
                : ""}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // ── Timeline ───────────────────────────────────────────────────────
  function renderTimeline(p) {
    const reports = allReports
      .filter(r => r.patientId === p.id)
      .sort((a,b) => (b.uploadedAt?.seconds||0) - (a.uploadedAt?.seconds||0));

    if (reports.length === 0) return emptyState("fa-timeline","No activity yet");

    const STATUS_ICONS = {
      pending_review: { icon:"fa-clock",        color:"#f59e0b" },
      verified:       { icon:"fa-circle-check", color:"#10b981" },
      rejected:       { icon:"fa-ban",          color:"#ef4444" },
    };

    return `<div class="relative">
      <!-- Vertical line -->
      <div class="absolute left-4 top-0 bottom-0 w-0.5"
           style="background:var(--color-border)"></div>

      <div class="space-y-5 pl-10">
        ${reports.map(r => {
          const si   = STATUS_ICONS[r.status] || STATUS_ICONS.pending_review;
          const date = r.uploadedAt?.toDate
            ? r.uploadedAt.toDate().toLocaleString("en-IN",{
                day:"2-digit", month:"short", year:"numeric",
                hour:"2-digit", minute:"2-digit"
              })
            : "—";

          return `
            <div class="relative">
              <!-- Dot -->
              <div class="absolute -left-10 w-8 h-8 rounded-full flex items-center
                          justify-center"
                   style="background:color-mix(in srgb,${si.color} 12%,transparent);
                          border:2px solid ${si.color}">
                <i class="fa-solid ${si.icon} text-xs" style="color:${si.color}"></i>
              </div>

              <div class="card p-3">
                <div class="flex items-start justify-between gap-2">
                  <div>
                    <div class="font-semibold text-sm">
                      ${r.testName || "Lab Report"}
                    </div>
                    <div class="text-xs mt-0.5" style="color:var(--color-muted)">
                      ${r.category||"Other"}
                      ${r.priority && r.priority !== "normal"
                        ? ` · <span style="color:${(PRIORITY_CFG[r.priority]||PRIORITY_CFG.normal).color};
                                         font-weight:700">
                               ${r.priority.toUpperCase()}
                             </span>`
                        : ""}
                    </div>
                  </div>
                  ${r.fileUrl
                    ? `<a href="${r.fileUrl}" target="_blank"
                          class="w-7 h-7 rounded-lg flex items-center justify-center
                                 transition-colors hover:text-blue-600 shrink-0"
                          style="border:1px solid var(--color-border);color:var(--color-muted)">
                         <i class="fa-solid fa-file-pdf text-xs"></i>
                       </a>`
                    : ""}
                </div>
                <div class="text-[10px] mt-2" style="color:var(--color-muted)">
                  <i class="fa-regular fa-clock mr-1"></i>${date}
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>`;
  }

  // ── Helpers ────────────────────────────────────────────────────────
  function infoRow(label, value) {
    return `
      <div class="flex justify-between items-start py-2"
           style="border-bottom:1px solid var(--color-border)">
        <span class="text-xs shrink-0 mr-4" style="color:var(--color-muted)">${label}</span>
        <span class="text-xs font-medium text-right">${value}</span>
      </div>`;
  }

  function emptyState(icon, msg) {
    return `
      <div class="py-10 text-center">
        <div class="w-12 h-12 rounded-2xl mx-auto mb-3 flex items-center justify-center"
             style="background:color-mix(in srgb,var(--color-primary) 8%,transparent)">
          <i class="fa-solid ${icon} text-lg" style="color:var(--color-primary)"></i>
        </div>
        <p class="text-sm font-medium">${msg}</p>
      </div>`;
  }

  // ── Toast ──────────────────────────────────────────────────────────
  window.showToast = function(msg, type = "info") {
    const toast = document.getElementById("toast");
    const icons = {
      success:"fa-solid fa-circle-check",
      error:"fa-solid fa-circle-exclamation",
      info:"fa-solid fa-circle-info"
    };
    document.getElementById("toast-msg").textContent = msg;
    document.getElementById("toast-icon").className  = icons[type];
    toast.className = `show ${type}`;
    clearTimeout(window._tt);
    window._tt = setTimeout(() => { toast.className = type; }, 3500);
  };

  // ── Logout ─────────────────────────────────────────────────────────
  window.labLogout = async function() {
    await signOut(auth);
    window.location.href = "/auth/staff-login/";
  };

  // ── Init ───────────────────────────────────────────────────────────
  guardPage(["lab"], async (user, userData) => {
    labUid = user.uid;
    document.getElementById("sb-lab-name").textContent  = userData.name  || "Lab Staff";
    document.getElementById("sb-lab-email").textContent = userData.email || user.email || "—";

    await loadSettings();
    await loadData();

    const loader = document.getElementById("page-loader");
    loader.classList.add("hidden");
    setTimeout(() => loader.remove(), 500);
  });

</script>
</body>
</html>
