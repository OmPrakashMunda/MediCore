<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Appointments — MediCore</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --color-primary:      #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-secondary:    #0ea5e9;
      --color-bg:           #f8fafc;
      --color-surface:      #ffffff;
      --color-text:         #0f172a;
      --color-muted:        #64748b;
      --color-border:       #e2e8f0;
      --color-success:      #10b981;
      --color-warning:      #f59e0b;
      --color-error:        #ef4444;
      --font-family:        'Inter', sans-serif;
    }
    [data-theme="dark"] {
      --color-bg:      #0f172a;
      --color-surface: #1e293b;
      --color-text:    #f1f5f9;
      --color-muted:   #94a3b8;
      --color-border:  #334155;
    }
    * { box-sizing:border-box; font-family:var(--font-family); margin:0; padding:0; }
    body { background:var(--color-bg); color:var(--color-text); transition:background 0.25s,color 0.25s; }

    .card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:16px; }

    .badge {
      font-size:0.7rem; font-weight:600;
      border-radius:999px; padding:3px 10px;
      display:inline-flex; align-items:center; gap:4px;
    }

    /* Loader */
    #page-loader {
      position:fixed; inset:0; z-index:9999;
      background:var(--color-bg);
      display:flex; align-items:center; justify-content:center;
      transition:opacity 0.35s;
    }
    #page-loader.hidden { opacity:0; pointer-events:none; }
    .spinner {
      width:38px; height:38px; border-radius:50%;
      border:3px solid var(--color-border);
      border-top-color:var(--color-primary);
      animation:spin 0.75s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Toast */
    #toast {
      position:fixed; bottom:-80px; left:50%; transform:translateX(-50%);
      z-index:9999; padding:10px 20px; border-radius:12px;
      font-size:0.82rem; font-weight:500;
      display:flex; align-items:center; gap:8px;
      transition:bottom 0.35s;
      background:var(--color-surface); border:1px solid var(--color-border);
      box-shadow:0 8px 28px rgba(0,0,0,0.12);
    }
    #toast.show  { bottom:28px; }
    #toast.success #toast-icon { color:var(--color-success); }
    #toast.error   #toast-icon { color:var(--color-error); }
    #toast.info    #toast-icon { color:var(--color-primary); }

    /* Nav link */
    .pnav-link {
      font-size:0.82rem; font-weight:500; padding:6px 14px;
      border-radius:10px; color:var(--color-muted); text-decoration:none;
      transition:all 0.15s;
    }
    .pnav-link:hover { color:var(--color-primary); background:color-mix(in srgb,var(--color-primary) 8%,transparent); }
    .pnav-link.active { color:var(--color-primary); background:color-mix(in srgb,var(--color-primary) 12%,transparent); font-weight:600; }

    /* Filter tabs */
    .filter-tab {
      padding:7px 16px; border-radius:10px; font-size:0.8rem; font-weight:500;
      cursor:pointer; border:1.5px solid var(--color-border);
      color:var(--color-muted); background:var(--color-surface);
      transition:all 0.15s; white-space:nowrap;
    }
    .filter-tab:hover  { border-color:var(--color-primary); color:var(--color-primary); }
    .filter-tab.active {
      background:color-mix(in srgb,var(--color-primary) 10%,transparent);
      border-color:var(--color-primary); color:var(--color-primary);
    }

    /* Input */
    .input-field {
      width:100%; padding:9px 14px;
      background:var(--color-bg); border:1.5px solid var(--color-border);
      border-radius:10px; color:var(--color-text); font-size:0.85rem; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color:var(--color-primary);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--color-primary) 15%,transparent);
    }
    textarea.input-field { resize:vertical; min-height:80px; }
    .field-label { display:block; font-size:0.8rem; font-weight:500; margin-bottom:6px; color:var(--color-muted); }

    /* Btn */
    .btn-primary {
      padding:10px 20px; background:var(--color-primary); color:#fff;
      font-size:0.85rem; font-weight:600; border:none; border-radius:10px;
      cursor:pointer; display:inline-flex; align-items:center; gap:8px;
      transition:background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background:var(--color-primary-dark); transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.55; cursor:not-allowed; transform:none; }

    .btn-outline {
      padding:10px 20px; background:transparent;
      border:1.5px solid var(--color-border); border-radius:10px;
      font-size:0.85rem; font-weight:600; color:var(--color-text);
      cursor:pointer; display:inline-flex; align-items:center; gap:8px;
      transition:all 0.2s;
    }
    .btn-outline:hover { border-color:var(--color-primary); color:var(--color-primary); }

    /* Modal */
    .modal-overlay {
      position:fixed; inset:0; z-index:100;
      background:rgba(0,0,0,0.45); backdrop-filter:blur(4px);
      display:flex; align-items:center; justify-content:center;
      padding:16px; opacity:0; pointer-events:none; transition:opacity 0.25s;
    }
    .modal-overlay.show { opacity:1; pointer-events:all; }
    .modal-box {
      background:var(--color-surface); border:1px solid var(--color-border);
      border-radius:1.25rem; padding:1.75rem;
      width:100%; max-width:560px; max-height:92vh; overflow-y:auto;
      transform:translateY(20px); transition:transform 0.25s;
    }
    .modal-overlay.show .modal-box { transform:translateY(0); }

    /* Slot pick */
    .slot-btn {
      padding:6px 14px; border-radius:8px; font-size:0.78rem; font-weight:500;
      border:1.5px solid var(--color-border); background:var(--color-surface);
      color:var(--color-muted); cursor:pointer; transition:all 0.15s;
    }
    .slot-btn:hover { border-color:var(--color-primary); color:var(--color-primary); }
    .slot-btn.selected {
      background:var(--color-primary); border-color:var(--color-primary); color:#fff;
    }
    .slot-btn:disabled { opacity:0.4; cursor:not-allowed; }

    .fade-up    { animation:fadeUp 0.5s ease forwards; opacity:0; }
    .fade-up.d1 { animation-delay:0.1s; }
    .fade-up.d2 { animation-delay:0.2s; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  </style>
</head>

<body>
  <div id="page-loader"><div class="spinner"></div></div>

  <!-- ═══ Header ═══ -->
  <header class="sticky top-0 z-20"
          style="background:var(--color-surface);border-bottom:1px solid var(--color-border)">
    <div class="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between gap-3">
      <div class="flex items-center gap-3 min-w-0">
        <div id="hdr-logo-wrap"
             class="w-10 h-10 rounded-xl overflow-hidden flex items-center justify-center text-white shrink-0"
             style="background:linear-gradient(135deg,var(--color-primary),var(--color-secondary))">
          <img id="hdr-logo-img" src="" alt="" class="w-full h-full object-cover hidden" />
          <i id="hdr-logo-icon" class="fa-solid fa-heart-pulse"></i>
        </div>
        <div class="min-w-0">
          <div id="hospital-name" class="font-semibold text-sm truncate">MediCore</div>
          <div class="text-xs" style="color:var(--color-muted)">Patient Portal</div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="theme-toggle"
                class="w-9 h-9 rounded-xl border flex items-center justify-center"
                style="border-color:var(--color-border);color:var(--color-muted)">
          <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
        </button>
        <button onclick="patientLogout()"
                class="px-4 py-2 rounded-xl text-xs font-medium text-white"
                style="background:var(--color-primary)">
          <i class="fa-solid fa-right-from-bracket mr-1"></i>Logout
        </button>
      </div>
    </div>
    <!-- Sub-nav -->
    <div class="max-w-6xl mx-auto px-5 pb-3 flex gap-1 overflow-x-auto">
      <a href="/patient/dashboard/"    class="pnav-link"><i class="fa-solid fa-gauge-high mr-1.5"></i>Dashboard</a>
      <a href="/patient/appointments/" class="pnav-link active"><i class="fa-solid fa-calendar-check mr-1.5"></i>Appointments</a>
      <a href="/patient/reports/"      class="pnav-link"><i class="fa-solid fa-file-waveform mr-1.5"></i>Reports</a>
      <a href="/patient/profile/"      class="pnav-link"><i class="fa-solid fa-circle-user mr-1.5"></i>Profile</a>
    </div>
  </header>

  <!-- ═══ Book Appointment Modal ═══ -->
  <div id="book-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-bold text-sm">Book Appointment</h3>
        <button onclick="closeBookModal()"
                class="w-8 h-8 rounded-lg border flex items-center justify-center transition-colors hover:text-red-500"
                style="border-color:var(--color-border);color:var(--color-muted)">
          <i class="fa-solid fa-xmark text-sm"></i>
        </button>
      </div>

      <!-- Step 1: Select doctor -->
      <div id="book-step-1">
        <label class="field-label">Select Doctor</label>
        <div class="relative mb-4">
          <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-xs"
             style="color:var(--color-muted)"></i>
          <input type="text" id="doc-search" class="input-field pl-9"
                 placeholder="Search by name or specialization…"
                 oninput="filterDoctors(this.value)" />
        </div>
        <div id="doctors-list" class="space-y-2 max-h-72 overflow-y-auto">
          <p class="text-center text-sm py-6" style="color:var(--color-muted)">
            <i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Loading doctors…
          </p>
        </div>
      </div>

      <!-- Step 2: Pick date & slot -->
      <div id="book-step-2" class="hidden">
        <button onclick="goToStep(1)" class="text-xs font-medium mb-4 flex items-center gap-1"
                style="color:var(--color-primary)">
          <i class="fa-solid fa-arrow-left"></i> Back to doctors
        </button>
        <div id="selected-doc-info" class="flex items-center gap-3 mb-5 p-3 rounded-xl"
             style="background:color-mix(in srgb,var(--color-primary) 6%,transparent)">
        </div>

        <label class="field-label">Select Date</label>
        <input type="date" id="book-date" class="input-field mb-4" onchange="loadSlots()" />

        <label class="field-label">Available Slots</label>
        <div id="slots-container" class="flex flex-wrap gap-2 mb-4">
          <p class="text-xs" style="color:var(--color-muted)">Pick a date first</p>
        </div>

        <label class="field-label">Reason for Visit</label>
        <textarea id="book-reason" class="input-field mb-5" placeholder="Describe your symptoms or reason…"></textarea>

        <button id="confirm-book-btn" class="btn-primary w-full justify-center" onclick="confirmBooking()" disabled>
          <i class="fa-solid fa-calendar-plus"></i>
          <span id="book-btn-text">Confirm Appointment</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ Detail Modal ═══ -->
  <div id="detail-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-bold text-sm">Appointment Details</h3>
        <button onclick="closeDetailModal()"
                class="w-8 h-8 rounded-lg border flex items-center justify-center transition-colors hover:text-red-500"
                style="border-color:var(--color-border);color:var(--color-muted)">
          <i class="fa-solid fa-xmark text-sm"></i>
        </button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- ═══ Main ═══ -->
  <main class="max-w-6xl mx-auto p-5 md:p-6 space-y-5">

    <!-- Top row: stats + book button -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 fade-up">
      <div class="flex gap-3 flex-wrap">
        <div class="card px-4 py-3 flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center"
               style="background:color-mix(in srgb,var(--color-primary) 10%,transparent)">
            <i class="fa-solid fa-calendar-check text-sm" style="color:var(--color-primary)"></i>
          </div>
          <div>
            <div id="count-total" class="font-bold text-lg">0</div>
            <div class="text-xs" style="color:var(--color-muted)">Total</div>
          </div>
        </div>
        <div class="card px-4 py-3 flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center"
               style="background:color-mix(in srgb,var(--color-warning) 10%,transparent)">
            <i class="fa-solid fa-clock text-sm" style="color:var(--color-warning)"></i>
          </div>
          <div>
            <div id="count-upcoming" class="font-bold text-lg">0</div>
            <div class="text-xs" style="color:var(--color-muted)">Upcoming</div>
          </div>
        </div>
        <div class="card px-4 py-3 flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center"
               style="background:color-mix(in srgb,var(--color-success) 10%,transparent)">
            <i class="fa-solid fa-circle-check text-sm" style="color:var(--color-success)"></i>
          </div>
          <div>
            <div id="count-completed" class="font-bold text-lg">0</div>
            <div class="text-xs" style="color:var(--color-muted)">Completed</div>
          </div>
        </div>
      </div>
      <button class="btn-primary" onclick="openBookModal()">
        <i class="fa-solid fa-calendar-plus"></i> Book Appointment
      </button>
    </div>

    <!-- Filters -->
    <div class="flex flex-col sm:flex-row gap-3 fade-up d1">
      <div class="flex gap-2 flex-wrap">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-tab" data-filter="pending"   onclick="setFilter('pending',this)"><i class="fa-solid fa-clock mr-1"></i>Pending</button>
        <button class="filter-tab" data-filter="confirmed" onclick="setFilter('confirmed',this)"><i class="fa-solid fa-circle-check mr-1"></i>Confirmed</button>
        <button class="filter-tab" data-filter="completed" onclick="setFilter('completed',this)"><i class="fa-solid fa-flag-checkered mr-1"></i>Completed</button>
        <button class="filter-tab" data-filter="cancelled" onclick="setFilter('cancelled',this)"><i class="fa-solid fa-ban mr-1"></i>Cancelled</button>
      </div>
      <div class="relative ml-auto">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-xs"
           style="color:var(--color-muted)"></i>
        <input type="text" placeholder="Search…" class="input-field pl-9"
               style="width:200px" oninput="setSearch(this.value)" />
      </div>
    </div>

    <!-- Appointments list -->
    <div id="appt-list" class="space-y-3 fade-up d2">
      <p class="text-center py-10 text-sm" style="color:var(--color-muted)">
        <i class="fa-solid fa-circle-notch fa-spin mr-2"></i>Loading appointments…
      </p>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast"><i id="toast-icon"></i><span id="toast-msg"></span></div>

  <!-- ═══ Script ═══ -->
  <script type="module">
    import { auth, db }    from "../../assets/js/firebase-config.js";
    import { guardPage }   from "../../assets/js/auth-guard.js";
    import { logActivity } from "../../assets/js/activity-logger.js";
    import {
      doc, getDoc, getDocs, addDoc, updateDoc,
      collection, query, where, serverTimestamp, Timestamp
    } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

    /* ── State ─────────────────────────────────────── */
    let currentUser  = null;
    let allAppts     = [];
    let filtered     = [];
    let activeFilter = "all";
    let activeSearch = "";
    let doctorCache  = {};   // uid → { name, specialization, ... }
    let allDoctors   = [];   // for booking modal
    let selectedDoc  = null;
    let selectedSlot = null;

    const STATUS_MAP = {
      pending:   { label:"Pending",   color:"var(--color-warning)", icon:"fa-clock" },
      confirmed: { label:"Confirmed", color:"var(--color-primary)", icon:"fa-circle-check" },
      completed: { label:"Completed", color:"var(--color-success)", icon:"fa-flag-checkered" },
      cancelled: { label:"Cancelled", color:"var(--color-error)",   icon:"fa-ban" },
    };

    function statusBadge(s) {
      const st = STATUS_MAP[(s||"").toLowerCase()] || { label:s||"Unknown", color:"var(--color-muted)", icon:"fa-circle-question" };
      return `<span class="badge" style="background:color-mix(in srgb,${st.color} 14%,transparent);color:${st.color}">
                <i class="fa-solid ${st.icon}" style="font-size:0.6rem"></i>${st.label}</span>`;
    }

    function fmtDate(v) {
      if (!v) return "—";
      const d = v.toDate ? v.toDate() : new Date(v);
      return isNaN(d) ? "—" : d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
    }

    function fmtDateLong(v) {
      if (!v) return "—";
      const d = v.toDate ? v.toDate() : new Date(v);
      return isNaN(d) ? "—" : d.toLocaleDateString("en-IN",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
    }

    function avatarColor(name) {
      const colors = ["#2563eb","#0ea5e9","#8b5cf6","#10b981","#f59e0b","#ec4899"];
      return colors[(name||"").charCodeAt(0) % colors.length];
    }

    /* ── Theme ─────────────────────────────────────── */
    const htmlEl = document.getElementById("html-root");
    function applyTheme(dark) {
      htmlEl.setAttribute("data-theme", dark ? "dark" : "light");
      document.getElementById("theme-icon").className = dark ? "fa-solid fa-sun text-sm" : "fa-solid fa-moon text-sm";
      localStorage.setItem("theme", dark ? "dark" : "light");
    }
    applyTheme(localStorage.getItem("theme") === "dark");
    document.getElementById("theme-toggle").addEventListener("click", () =>
      applyTheme(htmlEl.getAttribute("data-theme") !== "dark"));

    /* ── Settings ──────────────────────────────────── */
    async function loadSettings() {
      try {
        const snap = await getDoc(doc(db, "settings", "hospital"));
        if (!snap.exists()) return;
        const s = snap.data(), t = s.theme || {}, r = document.documentElement;
        if (t.primary)     r.style.setProperty("--color-primary",      t.primary);
        if (t.primaryDark) r.style.setProperty("--color-primary-dark", t.primaryDark);
        if (t.secondary)   r.style.setProperty("--color-secondary",    t.secondary);
        if (t.fontFamily)  r.style.setProperty("--font-family",        t.fontFamily);
        document.getElementById("hospital-name").textContent = s.hospitalName || "MediCore";
        document.title = `My Appointments — ${s.hospitalName || "MediCore"}`;
        if (s.logoUrl) {
          const img = document.getElementById("hdr-logo-img");
          img.src = s.logoUrl; img.classList.remove("hidden");
          document.getElementById("hdr-logo-icon").classList.add("hidden");
        }
      } catch(e) { console.error("Settings:", e); }
    }

    /* ── Toast ─────────────────────────────────────── */
    window.showToast = function(msg, type="info") {
      const t = document.getElementById("toast");
      const icons = { success:"fa-solid fa-circle-check", error:"fa-solid fa-circle-exclamation", info:"fa-solid fa-circle-info" };
      document.getElementById("toast-msg").textContent = msg;
      document.getElementById("toast-icon").className  = icons[type]||icons.info;
      t.className = `show ${type}`;
      clearTimeout(window._tt);
      window._tt = setTimeout(() => { t.className = type; }, 3500);
    };

    /* ── Load appointments ─────────────────────────── */
    async function loadAppointments() {
      const snap = await getDocs(query(
        collection(db, "appointments"),
        where("patientId", "==", currentUser.uid)
      ));
      allAppts = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      allAppts.sort((a,b) => (b.date?.seconds||0) - (a.date?.seconds||0));

      // Pre-fetch doctor names
      const docIds = [...new Set(allAppts.map(a => a.doctorId).filter(Boolean))];
      await Promise.all(docIds.map(async uid => {
        if (doctorCache[uid]) return;
        try {
          const s = await getDoc(doc(db,"users",uid));
          if (s.exists()) doctorCache[uid] = s.data();
        } catch(_){}
      }));

      updateCounts();
      applyFilters();
    }

    function updateCounts() {
      const now = new Date();
      document.getElementById("count-total").textContent = allAppts.length;
      document.getElementById("count-upcoming").textContent = allAppts.filter(a => {
        const d = a.date?.toDate ? a.date.toDate() : new Date(a.date);
        return d >= now && a.status !== "cancelled" && a.status !== "completed";
      }).length;
      document.getElementById("count-completed").textContent = allAppts.filter(a => a.status === "completed").length;
    }

    /* ── Filters ───────────────────────────────────── */
    window.setFilter = function(f, btn) {
      activeFilter = f;
      document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      applyFilters();
    };
    window.setSearch = function(q) { activeSearch = q.toLowerCase(); applyFilters(); };

    function applyFilters() {
      filtered = [...allAppts];
      if (activeFilter !== "all") filtered = filtered.filter(a => a.status === activeFilter);
      if (activeSearch) {
        filtered = filtered.filter(a => {
          const dName = (doctorCache[a.doctorId]?.name || "").toLowerCase();
          return dName.includes(activeSearch) || (a.reason||"").toLowerCase().includes(activeSearch);
        });
      }
      renderList();
    }

    /* ── Render appointment list ───────────────────── */
    function renderList() {
      const el = document.getElementById("appt-list");
      if (!filtered.length) {
        el.innerHTML = `
          <div class="card p-10 text-center">
            <div class="w-14 h-14 rounded-2xl mx-auto mb-3 flex items-center justify-center"
                 style="background:color-mix(in srgb,var(--color-primary) 8%,transparent)">
              <i class="fa-solid fa-calendar-xmark text-xl" style="color:var(--color-primary)"></i>
            </div>
            <p class="font-semibold text-sm">No appointments found</p>
            <p class="text-xs mt-1" style="color:var(--color-muted)">Try adjusting your filters or book a new appointment.</p>
          </div>`;
        return;
      }

      el.innerHTML = filtered.map(a => {
        const doc  = doctorCache[a.doctorId] || {};
        const name = doc.name || "Doctor";
        const spec = doc.specialization || "";
        const ini  = name.charAt(0).toUpperCase();
        const bg   = avatarColor(name);
        const canCancel = a.status === "pending" || a.status === "confirmed";

        return `
          <div class="card p-4 flex flex-col sm:flex-row sm:items-center gap-3">
            <div class="flex items-center gap-3 flex-1 min-w-0">
              <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-sm font-bold shrink-0"
                   style="background:${bg}">${ini}</div>
              <div class="min-w-0">
                <p class="text-sm font-semibold truncate">Dr. ${name}</p>
                <p class="text-xs truncate" style="color:var(--color-muted)">
                  ${spec ? spec + " · " : ""}${fmtDate(a.date)}${a.slot ? " · " + a.slot : ""}
                </p>
                <p class="text-xs mt-0.5 truncate" style="color:var(--color-muted)">
                  <i class="fa-solid fa-stethoscope mr-1"></i>${a.reason || "General Consultation"}
                </p>
              </div>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              ${statusBadge(a.status)}
              <button onclick="viewDetail('${a.id}')"
                      class="w-8 h-8 rounded-lg border flex items-center justify-center"
                      style="border-color:var(--color-border);color:var(--color-muted)"
                      title="View details">
                <i class="fa-solid fa-eye text-xs"></i>
              </button>
              ${canCancel ? `
              <button onclick="cancelAppt('${a.id}')"
                      class="w-8 h-8 rounded-lg border flex items-center justify-center transition-colors hover:text-red-500 hover:border-red-300"
                      style="border-color:var(--color-border);color:var(--color-muted)"
                      title="Cancel">
                <i class="fa-solid fa-xmark text-xs"></i>
              </button>` : ""}
            </div>
          </div>`;
      }).join("");
    }

    /* ── View appointment detail ────────────────────── */
    window.viewDetail = function(id) {
      const a = allAppts.find(x => x.id === id);
      if (!a) return;
      const d = doctorCache[a.doctorId] || {};
      const name = d.name || "Doctor";
      const bg   = avatarColor(name);

      document.getElementById("detail-content").innerHTML = `
        <div class="flex items-center gap-3 mb-5 p-3 rounded-xl"
             style="background:color-mix(in srgb,var(--color-primary) 6%,transparent)">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-sm font-bold shrink-0"
               style="background:${bg}">${name.charAt(0)}</div>
          <div>
            <p class="text-sm font-semibold">Dr. ${name}</p>
            <p class="text-xs" style="color:var(--color-muted)">${d.specialization || "—"}</p>
          </div>
          <div class="ml-auto">${statusBadge(a.status)}</div>
        </div>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between"><span style="color:var(--color-muted)">Date</span><span class="font-medium">${fmtDateLong(a.date)}</span></div>
          <div class="flex justify-between"><span style="color:var(--color-muted)">Time Slot</span><span class="font-medium">${a.slot || "—"}</span></div>
          <div class="flex justify-between"><span style="color:var(--color-muted)">Reason</span><span class="font-medium text-right max-w-[60%]">${a.reason || "—"}</span></div>
          ${a.notes ? `<div class="mt-3 p-3 rounded-xl" style="background:var(--color-bg)">
            <p class="text-xs font-semibold mb-1" style="color:var(--color-muted)">Doctor's Notes</p>
            <p class="text-sm">${a.notes}</p>
          </div>` : ""}
        </div>
        ${(a.status === "pending" || a.status === "confirmed") ? `
        <button onclick="cancelAppt('${a.id}');closeDetailModal()"
                class="w-full mt-5 py-2.5 rounded-xl text-sm font-semibold text-white"
                style="background:var(--color-error)">
          <i class="fa-solid fa-xmark mr-1"></i>Cancel Appointment
        </button>` : ""}
      `;
      document.getElementById("detail-modal").classList.add("show");
    };

    window.closeDetailModal = function() {
      document.getElementById("detail-modal").classList.remove("show");
    };

    /* ── Cancel appointment ─────────────────────────── */
    window.cancelAppt = async function(id) {
      if (!confirm("Are you sure you want to cancel this appointment?")) return;
      try {
        await updateDoc(doc(db, "appointments", id), {
          status: "cancelled",
          updatedAt: serverTimestamp()
        });
        logActivity("CANCEL_APPOINTMENT", { appointmentId: id }).catch(()=>{});
        showToast("Appointment cancelled", "success");
        await loadAppointments();
      } catch(e) {
        console.error(e);
        showToast("Failed to cancel: " + e.message, "error");
      }
    };

    /* ── Booking flow ──────────────────────────────── */
    window.openBookModal = async function() {
      selectedDoc = null; selectedSlot = null;
      goToStep(1);
      document.getElementById("book-modal").classList.add("show");
      await loadDoctorsList();
    };
    window.closeBookModal = function() {
      document.getElementById("book-modal").classList.remove("show");
    };

    window.goToStep = function(n) {
      document.getElementById("book-step-1").classList.toggle("hidden", n !== 1);
      document.getElementById("book-step-2").classList.toggle("hidden", n !== 2);
    };

    async function loadDoctorsList() {
      const snap = await getDocs(query(
        collection(db, "users"),
        where("role", "==", "doctor")
      ));
      allDoctors = snap.docs.map(d => ({ uid:d.id, ...d.data() }));

      // Fetch availability from doctors collection
      await Promise.all(allDoctors.map(async dr => {
        try {
          const s = await getDoc(doc(db, "doctors", dr.uid));
          if (s.exists()) dr._availability = s.data().availability || [];
        } catch(_) { dr._availability = []; }
      }));

      renderDoctorsList(allDoctors);
    }

    function renderDoctorsList(list) {
      const el = document.getElementById("doctors-list");
      if (!list.length) {
        el.innerHTML = `<p class="text-center text-sm py-6" style="color:var(--color-muted)">No doctors available</p>`;
        return;
      }
      el.innerHTML = list.map(dr => {
        const bg = avatarColor(dr.name || "D");
        return `
          <div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors hover:bg-opacity-10"
               style="border:1.5px solid var(--color-border);border-radius:14px"
               onclick="selectDoctor('${dr.uid}')">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-sm font-bold shrink-0"
                 style="background:${bg}">${(dr.name||"D").charAt(0)}</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-semibold truncate">Dr. ${dr.name || "Doctor"}</p>
              <p class="text-xs truncate" style="color:var(--color-muted)">${dr.specialization || "General"}</p>
            </div>
            <i class="fa-solid fa-chevron-right text-xs" style="color:var(--color-muted)"></i>
          </div>`;
      }).join("");
    }

    window.filterDoctors = function(q) {
      q = q.toLowerCase();
      const list = allDoctors.filter(d =>
        (d.name||"").toLowerCase().includes(q) ||
        (d.specialization||"").toLowerCase().includes(q)
      );
      renderDoctorsList(list);
    };

    window.selectDoctor = function(uid) {
      const dr = allDoctors.find(d => d.uid === uid);
      if (!dr) return;
      selectedDoc = dr;
      selectedSlot = null;
      doctorCache[uid] = dr;

      // Show doctor info
      const bg = avatarColor(dr.name || "D");
      document.getElementById("selected-doc-info").innerHTML = `
        <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white text-sm font-bold shrink-0"
             style="background:${bg}">${(dr.name||"D").charAt(0)}</div>
        <div>
          <p class="text-sm font-semibold">Dr. ${dr.name || "Doctor"}</p>
          <p class="text-xs" style="color:var(--color-muted)">${dr.specialization || "General"}</p>
        </div>`;

      // Set min date to today
      const today = new Date().toISOString().slice(0,10);
      const dateEl = document.getElementById("book-date");
      dateEl.min = today;
      dateEl.value = "";
      document.getElementById("slots-container").innerHTML =
        `<p class="text-xs" style="color:var(--color-muted)">Pick a date to see available slots</p>`;
      document.getElementById("book-reason").value = "";
      document.getElementById("confirm-book-btn").disabled = true;

      goToStep(2);
    };

    /* ── Load available slots for selected date ──── */
    window.loadSlots = async function() {
      const dateStr = document.getElementById("book-date").value;
      if (!dateStr || !selectedDoc) return;

      const container = document.getElementById("slots-container");
      selectedSlot = null;
      document.getElementById("confirm-book-btn").disabled = true;

      const chosen = new Date(dateStr + "T00:00:00");
      const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const dayName  = dayNames[chosen.getDay()];

      // Find availability for this day of week
      const avail = (selectedDoc._availability || []).filter(a => a.day === dayName);
      if (!avail.length) {
        container.innerHTML = `<p class="text-xs" style="color:var(--color-error)">
          <i class="fa-solid fa-circle-xmark mr-1"></i>Doctor is not available on ${dayName}s</p>`;
        return;
      }

      // Count existing appointments per slot for this doctor + date
      const dayStart = Timestamp.fromDate(new Date(dateStr + "T00:00:00"));
      const dayEnd   = Timestamp.fromDate(new Date(dateStr + "T23:59:59"));
      const existingSnap = await getDocs(query(
        collection(db, "appointments"),
        where("doctorId", "==", selectedDoc.uid),
        where("date", ">=", dayStart),
        where("date", "<=", dayEnd)
      ));
      const existingAppts = existingSnap.docs.map(d => d.data());
      const slotCounts = {};
      existingAppts.forEach(a => {
        if (a.status !== "cancelled") {
          slotCounts[a.slot] = (slotCounts[a.slot] || 0) + 1;
        }
      });

      // Build slot buttons
      let html = "";
      avail.forEach(slot => {
        const label = `${slot.start} – ${slot.end}`;
        const maxP  = slot.maxPatients || 10;
        const taken = slotCounts[label] || 0;
        const full  = taken >= maxP;
        html += `<button class="slot-btn${full ? "" : ""}"
                         ${full ? "disabled" : ""}
                         onclick="pickSlot(this,'${label}')">
                   ${label}${full ? " (Full)" : ""}
                 </button>`;
      });

      container.innerHTML = html || `<p class="text-xs" style="color:var(--color-muted)">No slots configured</p>`;
    };

    window.pickSlot = function(btn, label) {
      document.querySelectorAll(".slot-btn").forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedSlot = label;
      document.getElementById("confirm-book-btn").disabled = false;
    };

    /* ── Confirm booking ───────────────────────────── */
    window.confirmBooking = async function() {
      if (!selectedDoc || !selectedSlot) return;
      const dateStr = document.getElementById("book-date").value;
      const reason  = document.getElementById("book-reason").value.trim();
      if (!dateStr) { showToast("Please select a date", "error"); return; }

      const btn = document.getElementById("confirm-book-btn");
      btn.disabled = true;
      document.getElementById("book-btn-text").textContent = "Booking…";

      try {
        await addDoc(collection(db, "appointments"), {
          patientId:  currentUser.uid,
          doctorId:   selectedDoc.uid,
          date:       Timestamp.fromDate(new Date(dateStr + "T00:00:00")),
          slot:       selectedSlot,
          reason:     reason || "General Consultation",
          status:     "pending",
          createdAt:  serverTimestamp(),
          updatedAt:  serverTimestamp()
        });

        logActivity("BOOK_APPOINTMENT", {
          doctorId: selectedDoc.uid,
          date: dateStr,
          slot: selectedSlot
        }).catch(()=>{});

        showToast("Appointment booked successfully!", "success");
        closeBookModal();
        await loadAppointments();
      } catch(e) {
        console.error(e);
        showToast("Booking failed: " + e.message, "error");
      } finally {
        btn.disabled = false;
        document.getElementById("book-btn-text").textContent = "Confirm Appointment";
      }
    };

    /* ── Logout ────────────────────────────────────── */
    window.patientLogout = async function() {
      await signOut(auth);
      window.location.href = "/auth/patient-login/";
    };

    /* ── Init ──────────────────────────────────────── */
    await loadSettings();

    guardPage(["patient"], async (user, userData) => {
      currentUser = user;
      await loadAppointments();
      logActivity("VIEW_APPOINTMENTS", { role:"patient" }).catch(()=>{});
      const loader = document.getElementById("page-loader");
      loader.classList.add("hidden");
      setTimeout(() => loader.remove(), 450);
    });
  </script>
</body>
</html>
