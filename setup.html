<!DOCTYPE html>
<html>
<head><title>First Admin Setup</title>
<style>
  body { font-family:Inter,sans-serif; max-width:420px; margin:80px auto; padding:24px; }
  input {
    display:block; width:100%; padding:10px 14px; margin-bottom:12px;
    border:1.5px solid #e2e8f0; border-radius:10px;
    font-size:0.875rem; outline:none; box-sizing:border-box;
  }
  input:focus { border-color:#2563eb; }
  button {
    width:100%; padding:12px; background:#2563eb; color:#fff;
    border:none; border-radius:10px; font-size:0.9rem;
    font-weight:600; cursor:pointer;
  }
  button:hover { background:#1d4ed8; }
  #status {
    margin-top:16px; padding:12px; border-radius:10px;
    font-size:0.85rem; display:none;
  }
  #status.ok  { background:#d1fae5; color:#065f46; display:block; }
  #status.err { background:#fee2e2; color:#991b1b; display:block; }
</style>
</head>
<body>

  <h2 style="margin-bottom:6px">⚕️ First Admin Setup</h2>
  <p style="color:#64748b;font-size:0.85rem;margin-bottom:24px">
    Run once to create your first admin account. Delete this file after.
  </p>

  <input id="name"     type="text"     placeholder="Full Name  (e.g. Super Admin)" />
  <input id="email"    type="email"    placeholder="Email  (e.g. admin@hospital.com)" />
  <input id="password" type="password" placeholder="Password  (min 8 characters)" />

  <button onclick="createAdmin()">Create Admin Account</button>
  <div id="status"></div>

<script type="module">
  // ✅ reads directly from your existing config — safe to push to GitHub
  import { auth, db } from "./assets/js/firebase-config.js";

  import {
    createUserWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

  import {
    doc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

  window.createAdmin = async function() {
    const name     = document.getElementById("name").value.trim();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const status   = document.getElementById("status");

    // Basic validation
    if (!name || !email || !password) {
      status.className = "err";
      status.textContent = "❌ Please fill all fields.";
      return;
    }
    if (password.length < 8) {
      status.className = "err";
      status.textContent = "❌ Password must be at least 8 characters.";
      return;
    }

    const btn = document.querySelector("button");
    btn.textContent = "Creating…"; btn.disabled = true;

    try {
      // 1. Create Firebase Auth user
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      const uid  = cred.user.uid;

      // 2. Create Firestore user doc
      await setDoc(doc(db, "users", uid), {
        name,
        email,
        role:      "admin",
        isActive:  true,
        createdAt: serverTimestamp(),
      });

      status.className   = "ok";
      status.innerHTML   = `
        ✅ Admin created successfully!<br/>
        <strong>UID:</strong> ${uid}<br/>
        <strong>Email:</strong> ${email}<br/><br/>
        <strong>⚠️ Delete this file (setup.html) now before pushing to GitHub.</strong>
      `;

    } catch(err) {
      status.className = "err";
      const messages = {
        "auth/email-already-in-use": "❌ This email is already registered.",
        "auth/invalid-email":        "❌ Invalid email address.",
        "auth/weak-password":        "❌ Password is too weak.",
      };
      status.textContent = messages[err.code] || `❌ Error: ${err.message}`;
    } finally {
      btn.textContent = "Create Admin Account"; btn.disabled = false;
    }
  };
</script>

</body>
</html>
