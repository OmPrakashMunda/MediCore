<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Availability — Doctor</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --color-primary:      #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-secondary:    #0ea5e9;
      --color-bg:           #f8fafc;
      --color-surface:      #ffffff;
      --color-text:         #0f172a;
      --color-muted:        #64748b;
      --color-border:       #e2e8f0;
      --color-success:      #10b981;
      --color-warning:      #f59e0b;
      --color-error:        #ef4444;
      --font-family:        'Inter', sans-serif;
    }
    [data-theme="dark"] {
      --color-bg:      #0f172a;
      --color-surface: #1e293b;
      --color-text:    #f1f5f9;
      --color-muted:   #94a3b8;
      --color-border:  #334155;
    }
    * { font-family:var(--font-family); box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--color-bg); color:var(--color-text); transition:background 0.3s,color 0.3s; }

    .main-content { margin-left:0; padding-top:64px; }
    @media(min-width:1024px) { .main-content { margin-left:260px; } }

    #page-loader {
      position:fixed; inset:0; z-index:9999;
      background:var(--color-bg);
      display:flex; align-items:center; justify-content:center;
      transition:opacity 0.4s;
    }
    #page-loader.hidden { opacity:0; pointer-events:none; }
    .spinner {
      width:36px; height:36px;
      border:3px solid var(--color-border);
      border-top-color:var(--color-primary);
      border-radius:50%; animation:spin 0.75s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    .card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:1rem; }

    /* Sidebar */
    #sidebar {
      position:fixed; top:0; left:0; height:100%; width:260px; z-index:40;
      background:var(--color-surface); border-right:1px solid var(--color-border);
      display:flex; flex-direction:column;
      transform:translateX(-100%); transition:transform 0.3s;
    }
    #sidebar.open { transform:translateX(0); }
    @media(min-width:1024px) { #sidebar { transform:translateX(0); } }
    #sidebar-overlay {
      position:fixed; inset:0; z-index:30;
      background:rgba(0,0,0,0.4); backdrop-filter:blur(3px); display:none;
    }
    #sidebar-overlay.show { display:block; }
    .nav-link {
      display:flex; align-items:center; gap:12px;
      padding:10px 14px; border-radius:12px;
      font-size:0.85rem; font-weight:500;
      color:var(--color-muted); text-decoration:none; transition:all 0.15s;
    }
    .nav-link:hover { background:color-mix(in srgb,var(--color-primary) 8%,transparent); color:var(--color-primary); }
    .nav-link.active { background:color-mix(in srgb,var(--color-primary) 12%,transparent); color:var(--color-primary); font-weight:600; }
    .nav-link i { width:18px; text-align:center; }

    /* Topbar */
    #topbar {
      position:fixed; top:0; right:0; left:0; z-index:20; height:64px;
      background:var(--color-surface); border-bottom:1px solid var(--color-border);
      display:flex; align-items:center; justify-content:space-between; padding:0 20px;
    }
    @media(min-width:1024px) { #topbar { left:260px; } }

    /* Toast */
    #toast {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(70px);
      padding:11px 20px; border-radius:12px; font-size:0.85rem; font-weight:500;
      display:flex; align-items:center; gap:10px;
      z-index:9999; opacity:0; white-space:nowrap;
      transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      box-shadow:0 8px 24px rgba(0,0,0,0.15);
    }
    #toast.show    { transform:translateX(-50%) translateY(0); opacity:1; }
    #toast.success { background:var(--color-success); color:#fff; }
    #toast.error   { background:var(--color-error);   color:#fff; }
    #toast.info    { background:var(--color-primary);  color:#fff; }

    /* Day card */
    .day-card {
      border-radius:14px; padding:16px 20px;
      border:1.5px solid var(--color-border);
      background:var(--color-surface);
      transition:all 0.2s;
    }
    .day-card.enabled {
      border-color:color-mix(in srgb,var(--color-primary) 30%,transparent);
      background:color-mix(in srgb,var(--color-primary) 3%,transparent);
    }

    /* Toggle switch */
    .toggle { position:relative; width:40px; height:22px; cursor:pointer; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle .slider {
      position:absolute; inset:0; border-radius:11px;
      background:var(--color-border); transition:background 0.2s;
    }
    .toggle .slider::before {
      content:''; position:absolute; width:16px; height:16px;
      left:3px; top:3px; border-radius:50%;
      background:#fff; transition:transform 0.2s;
    }
    .toggle input:checked + .slider { background:var(--color-primary); }
    .toggle input:checked + .slider::before { transform:translateX(18px); }

    /* Input */
    .input-field {
      padding:8px 12px; background:var(--color-bg);
      border:1.5px solid var(--color-border); border-radius:10px;
      color:var(--color-text); font-size:0.83rem; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color:var(--color-primary);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--color-primary) 15%,transparent);
    }

    /* Btn */
    .btn-primary {
      padding:10px 20px; background:var(--color-primary); color:#fff;
      font-size:0.85rem; font-weight:600; border:none; border-radius:10px;
      cursor:pointer; display:inline-flex; align-items:center; gap:8px;
      transition:background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background:var(--color-primary-dark); transform:translateY(-1px); }
    .btn-primary:disabled { opacity:0.55; cursor:not-allowed; transform:none; }

    .fade-up    { animation:fadeUp 0.5s ease forwards; opacity:0; }
    .fade-up.d1 { animation-delay:0.1s; }
    .fade-up.d2 { animation-delay:0.2s; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>

<div id="page-loader"><div class="spinner"></div></div>
<div id="toast"><i id="toast-icon"></i><span id="toast-msg"></span></div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- ══════════════════════════════ SIDEBAR ══════════════════════════════ -->
<aside id="sidebar">
  <div class="flex items-center gap-3 px-5 py-5"
       style="border-bottom:1px solid var(--color-border)">
    <div class="w-9 h-9 rounded-xl flex items-center justify-center
                text-white text-sm font-bold shrink-0 overflow-hidden"
         style="background:var(--color-primary)">
      <img id="sb-logo-img" src="" alt="" class="w-full h-full object-cover hidden"/>
      <i id="sb-logo-icon" class="fa-solid fa-hospital text-sm"></i>
    </div>
    <div>
      <div id="sb-hospital-name" class="text-sm font-semibold">MediCore</div>
      <div class="text-xs" style="color:var(--color-muted)">Doctor Portal</div>
    </div>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <a href="/doctor/dashboard/"    class="nav-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
    <a href="/doctor/appointments/" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
    <a href="/doctor/reports/"      class="nav-link"><i class="fa-solid fa-file-waveform"></i> Lab Reports</a>
    <a href="/doctor/patients/"     class="nav-link"><i class="fa-solid fa-users"></i> My Patients</a>
    <a href="/doctor/ai-tools/"      class="nav-link"><i class="fa-solid fa-brain"></i> AI Tools</a>
    <a href="/doctor/predict/"       class="nav-link"><i class="fa-solid fa-brain"></i> Tumor Predict</a>
    <div class="pt-3 pb-1 px-3">
      <p class="text-[10px] font-semibold uppercase tracking-wider"
         style="color:var(--color-muted)">Account</p>
    </div>
    <a href="/doctor/profile/"      class="nav-link"><i class="fa-solid fa-circle-user"></i> My Profile</a>
    <a href="/doctor/availability/" class="nav-link active"><i class="fa-solid fa-clock"></i> My Availability</a>
  </nav>

  <div class="px-3 py-4" style="border-top:1px solid var(--color-border)">
    <div class="flex items-center gap-3 px-3 py-2.5 rounded-xl mb-1"
         style="background:color-mix(in srgb,var(--color-primary) 6%,transparent)">
      <div class="w-8 h-8 rounded-full flex items-center justify-center
                  text-white text-xs shrink-0"
           style="background:var(--color-primary)">
        <i class="fa-solid fa-user-doctor text-xs"></i>
      </div>
      <div class="overflow-hidden">
        <div id="sb-doctor-name" class="text-xs font-semibold truncate">Doctor</div>
        <div id="sb-doctor-spec" class="text-xs truncate" style="color:var(--color-muted)">—</div>
      </div>
    </div>
    <button onclick="doctorLogout()"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl
                   text-sm transition-colors hover:text-red-500"
            style="color:var(--color-muted)">
      <i class="fa-solid fa-right-from-bracket w-4 text-center"></i> Logout
    </button>
  </div>
</aside>

<!-- ══════════════════════════════ TOPBAR ══════════════════════════════ -->
<header id="topbar">
  <div class="flex items-center gap-3">
    <button class="lg:hidden w-9 h-9 rounded-xl border flex items-center justify-center"
            style="border-color:var(--color-border)" onclick="toggleSidebar()">
      <i class="fa-solid fa-bars text-sm" style="color:var(--color-muted)"></i>
    </button>
    <div>
      <h1 class="text-sm font-semibold">My Availability</h1>
      <p class="text-xs" style="color:var(--color-muted)">Set your working days and time slots</p>
    </div>
  </div>
  <button id="theme-toggle"
          class="w-9 h-9 rounded-xl border flex items-center justify-center"
          style="border-color:var(--color-border);color:var(--color-muted)">
    <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
  </button>
</header>

<!-- ══════════════════════════════ MAIN ══════════════════════════════ -->
<div class="main-content min-h-screen">
  <div class="p-6 max-w-2xl mx-auto">

    <!-- Max patients per slot -->
    <div class="card p-5 mb-5 fade-up">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-sm font-semibold">Max Patients per Slot</h3>
          <p class="text-xs mt-0.5" style="color:var(--color-muted)">Default for new slots</p>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="adjustMax(-1)"
                  class="w-8 h-8 rounded-lg border flex items-center justify-center text-sm font-bold"
                  style="border-color:var(--color-border);color:var(--color-muted)">−</button>
          <input id="global-max" type="number" min="1" max="50" value="5"
                 class="input-field text-center font-bold" style="width:56px"/>
          <button onclick="adjustMax(1)"
                  class="w-8 h-8 rounded-lg border flex items-center justify-center text-sm font-bold"
                  style="border-color:var(--color-border);color:var(--color-muted)">+</button>
        </div>
      </div>
    </div>

    <!-- Day-by-day list -->
    <div id="days-container" class="space-y-3 mb-5 fade-up d1"></div>

    <!-- Save -->
    <div class="flex gap-3 fade-up d2">
      <button onclick="saveAvailability()" id="save-btn" class="btn-primary flex-1 justify-center">
        <i class="fa-solid fa-floppy-disk"></i>
        <span id="save-btn-text">Save Availability</span>
        <div id="save-spinner"
             class="hidden w-4 h-4 border-2 border-white border-t-transparent
                    rounded-full animate-spin"></div>
      </button>
    </div>

  </div>
</div>

<script type="module">
  import { auth, db }    from "../../assets/js/firebase-config.js";
  import { guardPage }   from "../../assets/js/auth-guard.js";
  import { logActivity } from "../../assets/js/activity-logger.js";
  import {
    doc, getDoc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

  const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const FULL = {
    Mon:"Monday", Tue:"Tuesday", Wed:"Wednesday", Thu:"Thursday",
    Fri:"Friday",  Sat:"Saturday", Sun:"Sunday"
  };

  // editState: { Mon: { enabled, slots:[{start,end},...] }, ... }
  let editState = {};
  let doctorUid = "";

  DAYS.forEach(d => { editState[d] = { enabled: false, slots: [] }; });

  // ── Theme ──────────────────────────────────────────────────────
  const htmlEl = document.getElementById("html-root");
  function applyTheme(dark) {
    htmlEl.setAttribute("data-theme", dark ? "dark" : "light");
    document.getElementById("theme-icon").className =
      dark ? "fa-solid fa-sun text-sm" : "fa-solid fa-moon text-sm";
    localStorage.setItem("theme", dark ? "dark" : "light");
  }
  applyTheme(localStorage.getItem("theme") === "dark");
  document.getElementById("theme-toggle").addEventListener("click", () =>
    applyTheme(htmlEl.getAttribute("data-theme") !== "dark")
  );

  window.toggleSidebar = () => {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebar-overlay").classList.toggle("show");
  };

  // ── Settings ───────────────────────────────────────────────────
  async function loadSettings() {
    try {
      const snap = await getDoc(doc(db,"settings","hospital"));
      if (!snap.exists()) return;
      const s = snap.data(); const t = s.theme || {};
      const r = document.documentElement;
      if (t.primary)    r.style.setProperty("--color-primary",      t.primary);
      if (t.primaryDark)r.style.setProperty("--color-primary-dark", t.primaryDark);
      if (t.secondary)  r.style.setProperty("--color-secondary",    t.secondary);
      if (t.fontFamily) r.style.setProperty("--font-family",        t.fontFamily);
      const sbName = document.getElementById("sb-hospital-name");
      if (sbName) sbName.textContent = s.hospitalName || "MediCore";
      if (s.logoUrl) {
        const img  = document.getElementById("sb-logo-img");
        const icon = document.getElementById("sb-logo-icon");
        if (img)  { img.src = s.logoUrl; img.classList.remove("hidden"); }
        if (icon) icon.classList.add("hidden");
      }
    } catch(e) { console.error(e); }
  }

  // ── Toast ──────────────────────────────────────────────────────
  window.showToast = function(msg, type = "info") {
    const toast = document.getElementById("toast");
    const icons = {
      success:"fa-solid fa-circle-check",
      error:"fa-solid fa-circle-exclamation",
      info:"fa-solid fa-circle-info"
    };
    document.getElementById("toast-msg").textContent = msg;
    document.getElementById("toast-icon").className  = icons[type];
    toast.className = `show ${type}`;
    clearTimeout(window._tt);
    window._tt = setTimeout(() => { toast.className = type; }, 3500);
  };

  // ── Render all days ────────────────────────────────────────────
  function render() {
    const container = document.getElementById("days-container");
    container.innerHTML = DAYS.map(day => {
      const ds = editState[day];
      const slotsHTML = ds.enabled ? `
        <div class="mt-3 space-y-2" id="slots-${day}">
          ${ds.slots.map((s, i) => `
            <div class="flex items-center gap-2">
              <input type="time" value="${s.start}" class="input-field text-xs" style="width:110px"
                     onchange="updateSlot('${day}',${i},'start',this.value)"/>
              <span class="text-xs" style="color:var(--color-muted)">to</span>
              <input type="time" value="${s.end}" class="input-field text-xs" style="width:110px"
                     onchange="updateSlot('${day}',${i},'end',this.value)"/>
              <button onclick="removeSlot('${day}',${i})"
                      class="w-7 h-7 rounded-lg flex items-center justify-center text-xs
                             transition-colors hover:text-red-500"
                      style="color:var(--color-muted)">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </div>
          `).join('')}
          <button onclick="addSlot('${day}')"
                  class="flex items-center gap-1.5 text-xs font-medium mt-1 px-2 py-1.5 rounded-lg
                         transition-colors hover:bg-blue-50"
                  style="color:var(--color-primary)">
            <i class="fa-solid fa-plus text-[10px]"></i> Add slot
          </button>
        </div>
      ` : '';

      return `
        <div class="day-card ${ds.enabled ? 'enabled' : ''}">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-xl flex items-center justify-center text-xs font-bold
                          ${ds.enabled ? 'text-white' : ''}"
                   style="background:${ds.enabled ? 'var(--color-primary)' : 'var(--color-bg)'};
                          color:${ds.enabled ? '#fff' : 'var(--color-muted)'}">
                ${day}
              </div>
              <div>
                <p class="text-sm font-semibold">${FULL[day]}</p>
                <p class="text-xs" style="color:var(--color-muted)">
                  ${ds.enabled
                    ? (ds.slots.length > 0 ? ds.slots.length + ' slot' + (ds.slots.length !== 1 ? 's' : '') : 'No slots yet')
                    : 'Off'}
                </p>
              </div>
            </div>
            <label class="toggle">
              <input type="checkbox" ${ds.enabled ? 'checked' : ''}
                     onchange="toggleDay('${day}', this.checked)"/>
              <span class="slider"></span>
            </label>
          </div>
          ${slotsHTML}
        </div>
      `;
    }).join('');
  }

  // ── Day toggle ─────────────────────────────────────────────────
  window.toggleDay = function(day, on) {
    editState[day].enabled = on;
    if (on && editState[day].slots.length === 0) {
      // Auto-add a default 9–5 slot
      editState[day].slots.push({ start: "09:00", end: "17:00" });
    }
    render();
  };

  // ── Slot CRUD ──────────────────────────────────────────────────
  window.addSlot = function(day) {
    editState[day].slots.push({ start: "09:00", end: "17:00" });
    render();
  };

  window.removeSlot = function(day, i) {
    editState[day].slots.splice(i, 1);
    render();
  };

  window.updateSlot = function(day, i, field, val) {
    editState[day].slots[i][field] = val;
  };

  // ── Adjust max ─────────────────────────────────────────────────
  window.adjustMax = function(delta) {
    const el = document.getElementById("global-max");
    el.value = Math.max(1, Math.min(50, (parseInt(el.value) || 5) + delta));
  };

  // ── Load from Firestore ────────────────────────────────────────
  async function loadAvailability() {
    try {
      const snap = await getDoc(doc(db, "doctors", doctorUid));
      if (!snap.exists()) return;

      const data = snap.data();
      const avail = data.availability || [];
      const maxPt = data.maxPatients || 5;
      document.getElementById("global-max").value = maxPt;

      // Reset
      DAYS.forEach(d => { editState[d] = { enabled: false, slots: [] }; });

      avail.forEach(slot => {
        const d = slot.day;
        if (!editState[d]) return;
        editState[d].enabled = true;
        editState[d].slots.push({ start: slot.start, end: slot.end });
      });
    } catch(e) { console.error("Load error:", e); }
  }

  // ── Save to Firestore ──────────────────────────────────────────
  window.saveAvailability = async function() {
    const btn = document.getElementById("save-btn");
    const txt = document.getElementById("save-btn-text");
    const spn = document.getElementById("save-spinner");
    btn.disabled = true; txt.textContent = "Saving…"; spn.classList.remove("hidden");

    try {
      const maxPatients = parseInt(document.getElementById("global-max").value) || 5;

      // Validate
      for (const day of DAYS) {
        const ds = editState[day];
        if (!ds.enabled) continue;
        for (const slot of ds.slots) {
          if (!slot.start || !slot.end) {
            showToast(`${FULL[day]}: fill in both start and end time.`, "error");
            return;
          }
          if (slot.start >= slot.end) {
            showToast(`${FULL[day]}: end time must be after start time.`, "error");
            return;
          }
        }
      }

      const availability = [];
      DAYS.forEach(day => {
        const ds = editState[day];
        if (!ds.enabled) return;
        ds.slots.forEach(slot => {
          availability.push({
            day,
            start: slot.start,
            end: slot.end,
            maxPatients
          });
        });
      });

      await setDoc(
        doc(db, "doctors", doctorUid),
        { availability, maxPatients, updatedAt: serverTimestamp() },
        { merge: true }
      );

      const activeDays = DAYS.filter(d => editState[d].enabled).length;
      logActivity("UPDATE_AVAILABILITY", {
        slotCount: availability.length, days: activeDays
      }).catch(() => {});

      showToast(`Saved — ${availability.length} slots across ${activeDays} days`, "success");

    } catch(e) {
      console.error("Save error:", e);
      showToast("Failed to save: " + e.message, "error");
    } finally {
      btn.disabled = false;
      txt.textContent = "Save Availability";
      spn.classList.add("hidden");
    }
  };

  // ── Logout ─────────────────────────────────────────────────────
  window.doctorLogout = async function() {
    await signOut(auth);
    window.location.href = "/auth/staff-login/?role=doctor";
  };

  // ── Init ───────────────────────────────────────────────────────
  guardPage(["doctor"], async (user, userData) => {
    doctorUid = user.uid;

    document.getElementById("sb-doctor-name").textContent =
      `Dr. ${userData.name || "Doctor"}`;
    document.getElementById("sb-doctor-spec").textContent =
      userData.specialization || "Doctor";

    await loadSettings();
    await loadAvailability();
    render();

    const loader = document.getElementById("page-loader");
    loader.classList.add("hidden");
    setTimeout(() => loader.remove(), 500);
  });
</script>
</body>
</html>
