<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Patients — Doctor</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --color-primary:      #2563eb;
      --color-primary-dark: #1d4ed8;
      --color-secondary:    #0ea5e9;
      --color-bg:           #f8fafc;
      --color-surface:      #ffffff;
      --color-text:         #0f172a;
      --color-muted:        #64748b;
      --color-border:       #e2e8f0;
      --color-success:      #10b981;
      --color-warning:      #f59e0b;
      --color-error:        #ef4444;
      --font-family:        'Inter', sans-serif;
    }
    [data-theme="dark"] {
      --color-bg:      #0f172a;
      --color-surface: #1e293b;
      --color-text:    #f1f5f9;
      --color-muted:   #94a3b8;
      --color-border:  #334155;
    }
    * { font-family:var(--font-family); box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--color-bg); color:var(--color-text); transition:background 0.3s,color 0.3s; }

    .main-content { margin-left:0; padding-top:64px; transition:margin 0.3s; }
    @media(min-width:1024px) { .main-content { margin-left:260px; } }

    #page-loader {
      position:fixed; inset:0; z-index:9999;
      background:var(--color-bg);
      display:flex; align-items:center; justify-content:center;
      transition:opacity 0.4s;
    }
    #page-loader.hidden { opacity:0; pointer-events:none; }
    .spinner {
      width:36px; height:36px;
      border:3px solid var(--color-border);
      border-top-color:var(--color-primary);
      border-radius:50%; animation:spin 0.75s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    .card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:1rem; }

    /* Sidebar */
    #sidebar {
      position:fixed; top:0; left:0; height:100%; width:260px; z-index:40;
      background:var(--color-surface); border-right:1px solid var(--color-border);
      display:flex; flex-direction:column;
      transform:translateX(-100%); transition:transform 0.3s;
    }
    #sidebar.open { transform:translateX(0); }
    @media(min-width:1024px) { #sidebar { transform:translateX(0); } }
    #sidebar-overlay {
      position:fixed; inset:0; z-index:30;
      background:rgba(0,0,0,0.4); backdrop-filter:blur(3px); display:none;
    }
    #sidebar-overlay.show { display:block; }
    .nav-link {
      display:flex; align-items:center; gap:12px;
      padding:10px 14px; border-radius:12px;
      font-size:0.85rem; font-weight:500;
      color:var(--color-muted); text-decoration:none; transition:all 0.15s;
    }
    .nav-link:hover { background:color-mix(in srgb,var(--color-primary) 8%,transparent); color:var(--color-primary); }
    .nav-link.active { background:color-mix(in srgb,var(--color-primary) 12%,transparent); color:var(--color-primary); font-weight:600; }
    .nav-link i { width:18px; text-align:center; }

    /* Topbar */
    #topbar {
      position:fixed; top:0; right:0; left:0; z-index:20; height:64px;
      background:var(--color-surface); border-bottom:1px solid var(--color-border);
      display:flex; align-items:center; justify-content:space-between; padding:0 20px;
    }
    @media(min-width:1024px) { #topbar { left:260px; } }

    /* Patient card */
    .patient-card {
      background:var(--color-surface); border:1.5px solid var(--color-border);
      border-radius:14px; padding:18px; cursor:pointer;
      transition:border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .patient-card:hover {
      border-color:var(--color-primary);
      box-shadow:0 6px 20px rgba(0,0,0,0.07);
      transform:translateY(-2px);
    }

    /* Avatar */
    .avatar {
      display:flex; align-items:center; justify-content:center;
      font-weight:700; color:#fff; flex-shrink:0; border-radius:12px;
    }

    /* Input */
    .input-field {
      padding:9px 14px; background:var(--color-bg);
      border:1.5px solid var(--color-border); border-radius:10px;
      color:var(--color-text); font-size:0.85rem; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s; width:100%;
    }
    .input-field:focus {
      border-color:var(--color-primary);
      box-shadow:0 0 0 3px color-mix(in srgb,var(--color-primary) 15%,transparent);
    }
    textarea.input-field { resize:vertical; min-height:70px; }

    /* Detail panel */
    #detail-panel {
      position:fixed; top:64px; right:0; bottom:0; width:420px;
      z-index:30; background:var(--color-surface);
      border-left:1px solid var(--color-border); overflow-y:auto;
      transform:translateX(100%); transition:transform 0.3s;
    }
    #detail-panel.open { transform:translateX(0); }
    @media(max-width:1280px) {
      #detail-panel { width:100%; top:0; z-index:50; border-left:none; }
    }

    /* Tab */
    .tab-btn {
      flex:1; padding:9px; text-align:center; font-size:0.8rem; font-weight:500;
      border-bottom:2px solid transparent; color:var(--color-muted);
      cursor:pointer; transition:all 0.15s; background:none; border-top:none;
      border-left:none; border-right:none;
    }
    .tab-btn.active { color:var(--color-primary); border-bottom-color:var(--color-primary); }

    /* Status badge */
    .status-badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:3px 9px; border-radius:99px; font-size:0.7rem; font-weight:600;
    }

    /* Filter tab */
    .filter-tab {
      padding:7px 16px; border-radius:10px; font-size:0.8rem; font-weight:500;
      cursor:pointer; border:1.5px solid var(--color-border);
      color:var(--color-muted); background:var(--color-surface);
      transition:all 0.15s; white-space:nowrap;
    }
    .filter-tab:hover  { border-color:var(--color-primary); color:var(--color-primary); }
    .filter-tab.active {
      background:color-mix(in srgb,var(--color-primary) 10%,transparent);
      border-color:var(--color-primary); color:var(--color-primary);
    }

    /* Toast */
    #toast {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(70px);
      padding:11px 20px; border-radius:12px; font-size:0.85rem; font-weight:500;
      display:flex; align-items:center; gap:10px; z-index:9999; opacity:0;
      white-space:nowrap;
      transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      box-shadow:0 8px 24px rgba(0,0,0,0.15);
    }
    #toast.show    { transform:translateX(-50%) translateY(0); opacity:1; }
    #toast.success { background:var(--color-success); color:#fff; }
    #toast.error   { background:var(--color-error);   color:#fff; }
    #toast.info    { background:var(--color-primary);  color:#fff; }

    .fade-up    { animation:fadeUp 0.5s ease forwards; opacity:0; }
    .fade-up.d1 { animation-delay:0.1s; }
    .fade-up.d2 { animation-delay:0.2s; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>

<div id="page-loader"><div class="spinner"></div></div>
<div id="toast"><i id="toast-icon"></i><span id="toast-msg"></span></div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- ══════════════════════════════
     SIDEBAR
══════════════════════════════ -->
<aside id="sidebar">
  <div class="flex items-center gap-3 px-5 py-5"
       style="border-bottom:1px solid var(--color-border)">
    <div class="w-9 h-9 rounded-xl flex items-center justify-center
                text-white text-sm font-bold shrink-0 overflow-hidden"
         style="background:var(--color-primary)">
      <img id="sb-logo-img" src="" alt="" class="w-full h-full object-cover hidden"/>
      <i id="sb-logo-icon" class="fa-solid fa-hospital text-sm"></i>
    </div>
    <div>
      <div id="sb-hospital-name" class="text-sm font-semibold">MediCore</div>
      <div class="text-xs" style="color:var(--color-muted)">Doctor Portal</div>
    </div>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    <a href="/doctor/dashboard/"    class="nav-link"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
    <a href="/doctor/appointments/" class="nav-link"><i class="fa-solid fa-calendar-check"></i> Appointments</a>
    <a href="/doctor/reports/"      class="nav-link"><i class="fa-solid fa-file-waveform"></i> Lab Reports</a>
    <a href="/doctor/patients/"     class="nav-link active"><i class="fa-solid fa-users"></i> My Patients</a>
    <div class="pt-3 pb-1 px-3">
      <p class="text-[10px] font-semibold uppercase tracking-wider"
         style="color:var(--color-muted)">Account</p>
    </div>
    <a href="/doctor/profile/"      class="nav-link"><i class="fa-solid fa-circle-user"></i> My Profile</a>
    <a href="/doctor/availability/" class="nav-link"><i class="fa-solid fa-clock"></i> My Availability</a>
  </nav>

  <div class="px-3 py-4" style="border-top:1px solid var(--color-border)">
    <div class="flex items-center gap-3 px-3 py-2.5 rounded-xl mb-1"
         style="background:color-mix(in srgb,var(--color-primary) 6%,transparent)">
      <div class="w-8 h-8 rounded-full flex items-center justify-center
                  text-white text-xs shrink-0"
           style="background:var(--color-primary)">
        <i class="fa-solid fa-user-doctor text-xs"></i>
      </div>
      <div class="overflow-hidden">
        <div id="sb-doctor-name" class="text-xs font-semibold truncate">Doctor</div>
        <div id="sb-doctor-spec" class="text-xs truncate" style="color:var(--color-muted)">—</div>
      </div>
    </div>
    <button onclick="doctorLogout()"
            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl
                   text-sm transition-colors hover:text-red-500"
            style="color:var(--color-muted)">
      <i class="fa-solid fa-right-from-bracket w-4 text-center"></i> Logout
    </button>
  </div>
</aside>

<!-- ══════════════════════════════
     TOPBAR
══════════════════════════════ -->
<header id="topbar">
  <div class="flex items-center gap-3">
    <button class="lg:hidden w-9 h-9 rounded-xl border flex items-center justify-center"
            style="border-color:var(--color-border)" onclick="toggleSidebar()">
      <i class="fa-solid fa-bars text-sm" style="color:var(--color-muted)"></i>
    </button>
    <div>
      <h1 class="text-sm font-semibold">My Patients</h1>
      <p class="text-xs" style="color:var(--color-muted)">All patients you've seen or have appointments with</p>
    </div>
  </div>
  <button id="theme-toggle"
          class="w-9 h-9 rounded-xl border flex items-center justify-center"
          style="border-color:var(--color-border);color:var(--color-muted)">
    <i id="theme-icon" class="fa-solid fa-moon text-sm"></i>
  </button>
</header>

<!-- ══════════════════════════════
     PATIENT DETAIL PANEL
══════════════════════════════ -->
<div id="detail-panel">

  <!-- Panel header -->
  <div class="sticky top-0 z-10 flex items-center justify-between px-5 py-4"
       style="background:var(--color-surface);border-bottom:1px solid var(--color-border)">
    <h3 class="font-semibold text-sm">Patient Profile</h3>
    <button onclick="closeDetail()"
            class="w-8 h-8 rounded-lg border flex items-center justify-center
                   hover:text-red-500 transition-colors"
            style="border-color:var(--color-border);color:var(--color-muted)">
      <i class="fa-solid fa-xmark text-sm"></i>
    </button>
  </div>

  <!-- Tabs -->
  <div class="flex" style="border-bottom:1px solid var(--color-border)">
    <button class="tab-btn active" onclick="switchTab('overview',this)">
      <i class="fa-solid fa-circle-user mr-1.5"></i> Overview
    </button>
    <button class="tab-btn" onclick="switchTab('appointments',this)">
      <i class="fa-solid fa-calendar mr-1.5"></i> Appointments
    </button>
    <button class="tab-btn" onclick="switchTab('reports',this)">
      <i class="fa-solid fa-file-waveform mr-1.5"></i> Reports
    </button>
  </div>

  <!-- Tab content -->
  <div id="panel-content" class="p-5"></div>

</div>


<!-- ══════════════════════════════
     MAIN
══════════════════════════════ -->
<div class="main-content min-h-screen" id="main-wrap">
  <div class="p-6 max-w-7xl mx-auto">

    <!-- Stats -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6 fade-up">
      <div class="card p-4 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:var(--color-primary)">
          <i class="fa-solid fa-users text-sm"></i>
        </div>
        <div>
          <div id="count-total" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Total Patients</div>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:var(--color-success)">
          <i class="fa-solid fa-calendar-check text-sm"></i>
        </div>
        <div>
          <div id="count-active" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Active (This Month)</div>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:var(--color-warning)">
          <i class="fa-solid fa-clock text-sm"></i>
        </div>
        <div>
          <div id="count-pending" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Pending Appointments</div>
        </div>
      </div>
      <div class="card p-4 flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0"
             style="background:#8b5cf6">
          <i class="fa-solid fa-file-waveform text-sm"></i>
        </div>
        <div>
          <div id="count-reports" class="font-bold text-lg">—</div>
          <div class="text-xs" style="color:var(--color-muted)">Total Reports</div>
        </div>
      </div>
    </div>

    <!-- Filter + Search -->
    <div class="flex flex-col sm:flex-row gap-3 mb-5 fade-up d1">
      <div class="flex gap-2 flex-wrap">
        <button class="filter-tab active" onclick="filterPatients('all',this)">All</button>
        <button class="filter-tab" onclick="filterPatients('recent',this)">
          <i class="fa-solid fa-clock-rotate-left mr-1"></i> Recent
        </button>
        <button class="filter-tab" onclick="filterPatients('pending',this)">
          <i class="fa-solid fa-clock mr-1"></i> Pending Appt
        </button>
      </div>
      <div class="relative flex-1 sm:max-w-xs ml-auto">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-xs"
           style="color:var(--color-muted)"></i>
        <input type="text" placeholder="Search by name, email…"
               class="input-field pl-9" oninput="searchPatients(this.value)" />
      </div>
    </div>

    <!-- Patient grid -->
    <div id="patient-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 fade-up d2"></div>

  </div>
</div>


<script type="module">
  import { auth, db }    from "../../assets/js/firebase-config.js";
  import { guardPage }   from "../../assets/js/auth-guard.js";
  import {
    collection, query, where, getDocs,
    doc, getDoc, updateDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";

  let allPatients    = [];
  let filtered       = [];
  let activeFilter   = "all";
  let activeSearch   = "";
  let allAppointments= [];
  let allReports     = [];
  let doctorUid      = "";
  let selectedPatient= null;
  let activeTab      = "overview";

  const COLORS = ["#2563eb","#0ea5e9","#8b5cf6","#10b981","#f59e0b","#ec4899"];
  const avatarBg = name => COLORS[( name || "?" ).charCodeAt(0) % COLORS.length];

  // ── Theme ──────────────────────────────────────────────────────────
  const htmlEl = document.getElementById("html-root");
  function applyTheme(dark) {
    htmlEl.setAttribute("data-theme", dark ? "dark" : "light");
    document.getElementById("theme-icon").className =
      dark ? "fa-solid fa-sun text-sm" : "fa-solid fa-moon text-sm";
    localStorage.setItem("theme", dark ? "dark" : "light");
  }
  applyTheme(localStorage.getItem("theme") === "dark");
  document.getElementById("theme-toggle").addEventListener("click", () =>
    applyTheme(htmlEl.getAttribute("data-theme") !== "dark")
  );

  window.toggleSidebar = () => {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebar-overlay").classList.toggle("show");
  };

  // ── Settings ───────────────────────────────────────────────────────
  async function loadSettings() {
    try {
      const snap = await getDoc(doc(db,"settings","hospital"));
      if (!snap.exists()) return;
      const s = snap.data(); const t = s.theme || {};
      const r = document.documentElement;
      if (t.primary)    r.style.setProperty("--color-primary",      t.primary);
      if (t.primaryDark)r.style.setProperty("--color-primary-dark", t.primaryDark);
      if (t.secondary)  r.style.setProperty("--color-secondary",    t.secondary);
      if (t.fontFamily) r.style.setProperty("--font-family",        t.fontFamily);
      const sbName = document.getElementById("sb-hospital-name");
      if (sbName) sbName.textContent = s.hospitalName || "MediCore";
      if (s.logoUrl) {
        const img  = document.getElementById("sb-logo-img");
        const icon = document.getElementById("sb-logo-icon");
        if (img)  { img.src = s.logoUrl; img.classList.remove("hidden"); }
        if (icon) icon.classList.add("hidden");
      }
    } catch(e) { console.error(e); }
  }

  // ── Load all data ──────────────────────────────────────────────────
  async function loadData() {
    try {
      // 1. All appointments for this doctor
      const apptSnap = await getDocs(query(
        collection(db,"appointments"),
        where("doctorId","==",doctorUid)
      ));
      allAppointments = apptSnap.docs.map(d => ({ id:d.id, ...d.data() }));

      // 2. All reports for this doctor
      const repSnap = await getDocs(query(
        collection(db,"reports"),
        where("doctorId","==",doctorUid)
      ));
      allReports = repSnap.docs.map(d => ({ id:d.id, ...d.data() }));

      // 3. Unique patient IDs
      const patientIds = [...new Set([
        ...allAppointments.map(a => a.patientId),
        ...allReports.map(r => r.patientId),
      ].filter(Boolean))];

      // 4. Fetch patient profiles
      const patientDocs = await Promise.all(patientIds.map(async pid => {
        try {
          const s = await getDoc(doc(db,"users",pid));
          if (s.exists()) return { id:pid, ...s.data() };
        } catch(_) {}
        return null;
      }));

      allPatients = patientDocs.filter(Boolean);

      // 5. Attach stats to each patient
      allPatients = allPatients.map(p => {
        const appts   = allAppointments.filter(a => a.patientId === p.id);
        const reports = allReports.filter(r => r.patientId === p.id);
        const lastAppt= appts.sort((a,b) =>
          (b.date?.seconds||0) - (a.date?.seconds||0))[0];
        return {
          ...p,
          apptCount:    appts.length,
          reportCount:  reports.length,
          pendingAppts: appts.filter(a => a.status === "pending").length,
          lastVisit:    lastAppt?.date || null,
        };
      });

      // Sort by last visit desc
      allPatients.sort((a,b) => (b.lastVisit?.seconds||0) - (a.lastVisit?.seconds||0));
      filtered = [...allPatients];

      updateCounts();
      renderGrid();

    } catch(e) {
      console.error(e);
      document.getElementById("patient-grid").innerHTML =
        `<div class="col-span-full p-8 text-center text-sm" style="color:var(--color-error)">
          <i class="fa-solid fa-circle-exclamation mr-2"></i> Failed to load patients.
        </div>`;
    }
  }

  // ── Counts ─────────────────────────────────────────────────────────
  function updateCounts() {
    const thisMonth = new Date();
    thisMonth.setDate(1); thisMonth.setHours(0,0,0,0);

    document.getElementById("count-total").textContent   = allPatients.length;
    document.getElementById("count-pending").textContent = allAppointments.filter(a => a.status === "pending").length;
    document.getElementById("count-reports").textContent = allReports.length;

    // Active = had appointment this month
    const active = allPatients.filter(p => {
      const appts = allAppointments.filter(a => a.patientId === p.id);
      return appts.some(a => {
        const d = a.date?.toDate ? a.date.toDate() : new Date(a.date);
        return d >= thisMonth;
      });
    });
    document.getElementById("count-active").textContent = active.length;
  }

  // ── Render patient grid ────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById("patient-grid");
    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="col-span-full p-10 text-center card">
          <div class="w-14 h-14 rounded-2xl mx-auto mb-3 flex items-center justify-center"
               style="background:color-mix(in srgb,var(--color-primary) 8%,transparent)">
            <i class="fa-solid fa-user-slash text-xl" style="color:var(--color-primary)"></i>
          </div>
          <p class="font-semibold text-sm">No patients found</p>
          <p class="text-xs mt-1" style="color:var(--color-muted)">Patients appear here after booking appointments</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(p => {
      const bg   = avatarBg(p.name);
      const ini  = (p.name||"?").charAt(0).toUpperCase();
      const last = p.lastVisit?.toDate
        ? p.lastVisit.toDate().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})
        : "—";

      return `
        <div class="patient-card" onclick="openDetail('${p.id}')">

          <!-- Header -->
          <div class="flex items-start gap-3 mb-4">
            <div class="avatar w-12 h-12 text-base shrink-0" style="background:${bg}">${ini}</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-sm truncate">${p.name || "—"}</div>
              <div class="text-xs truncate mt-0.5" style="color:var(--color-muted)">${p.email || "—"}</div>
              ${p.phone
                ? `<div class="text-xs mt-0.5" style="color:var(--color-muted)">
                     <i class="fa-solid fa-phone text-[9px] mr-1"></i>${p.phone}
                   </div>`
                : ""}
            </div>
            ${p.pendingAppts > 0
              ? `<span class="shrink-0 text-xs font-bold px-2 py-0.5 rounded-full"
                       style="background:color-mix(in srgb,var(--color-warning) 12%,transparent);
                              color:var(--color-warning)">
                   ${p.pendingAppts} pending
                 </span>`
              : ""}
          </div>

          <!-- Stats row -->
          <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="text-center p-2 rounded-xl"
                 style="background:var(--color-bg)">
              <div class="font-bold text-sm" style="color:var(--color-primary)">${p.apptCount}</div>
              <div class="text-[10px]" style="color:var(--color-muted)">Visits</div>
            </div>
            <div class="text-center p-2 rounded-xl"
                 style="background:var(--color-bg)">
              <div class="font-bold text-sm" style="color:#8b5cf6">${p.reportCount}</div>
              <div class="text-[10px]" style="color:var(--color-muted)">Reports</div>
            </div>
            <div class="text-center p-2 rounded-xl"
                 style="background:var(--color-bg)">
              <div class="font-bold text-sm" style="color:var(--color-success)">
                ${p.gender ? p.gender.charAt(0).toUpperCase() : "—"}
              </div>
              <div class="text-[10px]" style="color:var(--color-muted)">Gender</div>
            </div>
          </div>

          <!-- Footer -->
          <div class="flex items-center justify-between pt-3"
               style="border-top:1px solid var(--color-border)">
            <div class="text-xs flex items-center gap-1.5" style="color:var(--color-muted)">
              <i class="fa-regular fa-calendar text-[10px]"></i>
              Last visit: ${last}
            </div>
            <span class="text-xs font-medium" style="color:var(--color-primary)">
              View <i class="fa-solid fa-arrow-right text-[9px]"></i>
            </span>
          </div>

        </div>
      `;
    }).join('');
  }

  // ── Filters ────────────────────────────────────────────────────────
  window.filterPatients = function(type, btn) {
    activeFilter = type;
    document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    applyFilters();
  };

  window.searchPatients = function(val) {
    activeSearch = val;
    applyFilters();
  };

  function applyFilters() {
    filtered = [...allPatients];
    const now = new Date();

    if (activeFilter === "recent") {
      const ago30 = new Date(now - 30 * 86400000);
      filtered = filtered.filter(p =>
        p.lastVisit?.toDate ? p.lastVisit.toDate() >= ago30 : false
      );
    } else if (activeFilter === "pending") {
      filtered = filtered.filter(p => p.pendingAppts > 0);
    }

    if (activeSearch) {
      const q = activeSearch.toLowerCase();
      filtered = filtered.filter(p =>
        (p.name  || "").toLowerCase().includes(q) ||
        (p.email || "").toLowerCase().includes(q) ||
        (p.phone || "").includes(q)
      );
    }

    renderGrid();
  }

  // ── Open detail panel ──────────────────────────────────────────────
  window.openDetail = function(patientId) {
    selectedPatient = allPatients.find(p => p.id === patientId);
    if (!selectedPatient) return;

    activeTab = "overview";
    document.querySelectorAll(".tab-btn").forEach((b,i) =>
      b.classList.toggle("active", i === 0)
    );

    document.getElementById("detail-panel").classList.add("open");
    document.getElementById("main-wrap").style.paddingRight = "440px";

    renderTab();
  };

  window.closeDetail = function() {
    document.getElementById("detail-panel").classList.remove("open");
    document.getElementById("main-wrap").style.paddingRight = "";
    selectedPatient = null;
  };

  // ── Switch tab ─────────────────────────────────────────────────────
  window.switchTab = function(tab, btn) {
    activeTab = tab;
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderTab();
  };

  // ── Render tab content ─────────────────────────────────────────────
  function renderTab() {
    const p = selectedPatient;
    if (!p) return;
    const content = document.getElementById("panel-content");

    if (activeTab === "overview")      content.innerHTML = renderOverview(p);
    else if (activeTab === "appointments") content.innerHTML = renderApptHistory(p);
    else if (activeTab === "reports")  content.innerHTML = renderReportHistory(p);
  }

  // ── Overview tab ───────────────────────────────────────────────────
  function renderOverview(p) {
    const bg  = avatarBg(p.name);
    const ini = (p.name||"?").charAt(0).toUpperCase();

    return `
      <!-- Avatar + name -->
      <div class="flex items-center gap-4 p-4 rounded-2xl mb-5"
           style="background:color-mix(in srgb,var(--color-primary) 5%,transparent)">
        <div class="avatar w-16 h-16 rounded-2xl text-xl shrink-0"
             style="background:${bg}">${ini}</div>
        <div>
          <div class="font-bold text-base">${p.name || "—"}</div>
          <div class="text-xs mt-0.5" style="color:var(--color-muted)">${p.email || "—"}</div>
          ${p.phone
            ? `<div class="text-xs mt-0.5" style="color:var(--color-muted)">
                 <i class="fa-solid fa-phone mr-1"></i>${p.phone}
               </div>`
            : ""}
        </div>
      </div>

      <!-- Info rows -->
      <div class="card p-4 mb-4">
        <h4 class="text-xs font-semibold uppercase tracking-wider mb-3"
            style="color:var(--color-muted)">Patient Info</h4>
        ${infoRow("Age",        p.age     ? `${p.age} years` : "—")}
        ${infoRow("Gender",     p.gender  || "—")}
        ${infoRow("Blood Group",p.blood   || "—")}
        ${infoRow("Address",    p.address || "—")}
        ${infoRow("Patient ID", `<span class="font-mono text-xs">${p.id}</span>`)}
      </div>

      <!-- Quick stats -->
      <div class="grid grid-cols-3 gap-3 mb-4">
        <div class="card p-3 text-center">
          <div class="font-bold text-lg" style="color:var(--color-primary)">${p.apptCount}</div>
          <div class="text-xs" style="color:var(--color-muted)">Visits</div>
        </div>
        <div class="card p-3 text-center">
          <div class="font-bold text-lg" style="color:#8b5cf6">${p.reportCount}</div>
          <div class="text-xs" style="color:var(--color-muted)">Reports</div>
        </div>
        <div class="card p-3 text-center">
          <div class="font-bold text-lg" style="color:var(--color-warning)">${p.pendingAppts}</div>
          <div class="text-xs" style="color:var(--color-muted)">Pending</div>
        </div>
      </div>

      <!-- Quick links -->
      <div class="flex gap-3">
        <a href="/doctor/appointments/?search=${encodeURIComponent(p.name||'')}"
           class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-center
                  text-white transition-colors"
           style="background:var(--color-primary)">
          <i class="fa-solid fa-calendar mr-1.5"></i> View Appointments
        </a>
        <a href="/doctor/reports/?patient=${p.id}"
           class="flex-1 py-2.5 rounded-xl text-xs font-semibold text-center
                  transition-colors"
           style="background:color-mix(in srgb,#8b5cf6 10%,transparent);color:#8b5cf6">
          <i class="fa-solid fa-file-waveform mr-1.5"></i> View Reports
        </a>
      </div>
    `;
  }

  // ── Appointment history tab ────────────────────────────────────────
  function renderApptHistory(p) {
    const appts = allAppointments
      .filter(a => a.patientId === p.id)
      .sort((a,b) => (b.date?.seconds||0) - (a.date?.seconds||0));

    if (appts.length === 0) return emptyState("fa-calendar-xmark","No appointments found");

    const STATUS_CFG = {
      pending:   { color:"var(--color-warning)", icon:"fa-clock"         },
      confirmed: { color:"var(--color-success)", icon:"fa-circle-check"  },
      completed: { color:"#8b5cf6",              icon:"fa-flag-checkered"},
      cancelled: { color:"var(--color-error)",   icon:"fa-ban"           },
    };

    return appts.map(a => {
      const sc   = STATUS_CFG[a.status] || STATUS_CFG.pending;
      const date = a.date?.toDate
        ? a.date.toDate().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})
        : "—";
      return `
        <div class="flex items-start gap-3 py-3"
             style="border-bottom:1px solid var(--color-border)">
          <div class="w-8 h-8 rounded-xl flex items-center justify-center text-white shrink-0"
               style="background:color-mix(in srgb,${sc.color} 15%,transparent)">
            <i class="fa-solid ${sc.icon} text-xs" style="color:${sc.color}"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium">${date} · ${a.slot || "—"}</div>
            <div class="text-xs mt-0.5 truncate" style="color:var(--color-muted)">
              ${a.reason || "No reason provided"}
            </div>
            ${a.notes
              ? `<div class="text-xs mt-1 p-2 rounded-lg"
                      style="background:var(--color-bg);color:var(--color-muted)">
                   <i class="fa-solid fa-note-sticky mr-1"></i>${a.notes}
                 </div>`
              : ""}
          </div>
          <span class="status-badge shrink-0"
                style="background:color-mix(in srgb,${sc.color} 12%,transparent);
                       color:${sc.color}">
            ${a.status}
          </span>
        </div>
      `;
    }).join('');
  }

  // ── Report history tab ─────────────────────────────────────────────
  function renderReportHistory(p) {
    const reports = allReports
      .filter(r => r.patientId === p.id)
      .sort((a,b) => (b.uploadedAt?.seconds||0) - (a.uploadedAt?.seconds||0));

    if (reports.length === 0) return emptyState("fa-file-circle-xmark","No reports found");

    const STATUS_CFG = {
      pending_review: { color:"var(--color-warning)", label:"Pending"  },
      verified:       { color:"var(--color-success)", label:"Verified" },
      rejected:       { color:"var(--color-error)",   label:"Rejected" },
    };

    return reports.map(r => {
      const sc   = STATUS_CFG[r.status] || STATUS_CFG.pending_review;
      const date = r.uploadedAt?.toDate
        ? r.uploadedAt.toDate().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})
        : "—";
      return `
        <div class="flex items-start gap-3 py-3"
             style="border-bottom:1px solid var(--color-border)">
          <div class="w-8 h-8 rounded-xl flex items-center justify-center shrink-0"
               style="background:color-mix(in srgb,var(--color-primary) 10%,transparent)">
            <i class="fa-solid fa-file-waveform text-xs"
               style="color:var(--color-primary)"></i>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium truncate">
              ${r.testName || r.type || "Lab Report"}
            </div>
            <div class="text-xs mt-0.5" style="color:var(--color-muted)">${date}</div>
            ${r.doctorNotes
              ? `<div class="text-xs mt-1 p-2 rounded-lg italic"
                      style="background:var(--color-bg);color:var(--color-muted)">
                   "${r.doctorNotes}"
                 </div>`
              : ""}
          </div>
          <div class="flex flex-col items-end gap-1.5 shrink-0">
            <span class="status-badge"
                  style="background:color-mix(in srgb,${sc.color} 12%,transparent);
                         color:${sc.color}">
              ${sc.label}
            </span>
            ${r.fileUrl
              ? `<a href="${r.fileUrl}" target="_blank"
                    class="text-xs font-medium hover:underline"
                    style="color:var(--color-primary)">
                   <i class="fa-solid fa-file-pdf mr-1"></i> PDF
                 </a>`
              : ""}
          </div>
        </div>
      `;
    }).join('');
  }

  // ── Helpers ────────────────────────────────────────────────────────
  function infoRow(label, value) {
    return `
      <div class="flex justify-between items-start py-2"
           style="border-bottom:1px solid var(--color-border)">
        <span class="text-xs shrink-0 mr-4" style="color:var(--color-muted)">${label}</span>
        <span class="text-xs font-medium text-right">${value}</span>
      </div>`;
  }

  function emptyState(icon, msg) {
    return `
      <div class="py-10 text-center">
        <div class="w-12 h-12 rounded-2xl mx-auto mb-3 flex items-center justify-center"
             style="background:color-mix(in srgb,var(--color-primary) 8%,transparent)">
          <i class="fa-solid ${icon} text-lg" style="color:var(--color-primary)"></i>
        </div>
        <p class="text-sm font-medium">${msg}</p>
      </div>`;
  }

  // ── Toast ──────────────────────────────────────────────────────────
  window.showToast = function(msg, type = "info") {
    const toast = document.getElementById("toast");
    const icons = { success:"fa-solid fa-circle-check", error:"fa-solid fa-circle-exclamation", info:"fa-solid fa-circle-info" };
    document.getElementById("toast-msg").textContent = msg;
    document.getElementById("toast-icon").className  = icons[type];
    toast.className = `show ${type}`;
    clearTimeout(window._tt);
    window._tt = setTimeout(() => { toast.className = type; }, 3500);
  };

  // ── Logout ─────────────────────────────────────────────────────────
  window.doctorLogout = async function() {
    await signOut(auth);
    window.location.href = "/auth/staff-login/?role=doctor";
  };

  // ── Init ───────────────────────────────────────────────────────────
  guardPage(["doctor"], async (user, userData) => {
    doctorUid = user.uid;

    document.getElementById("sb-doctor-name").textContent =
      `Dr. ${userData.name || "Doctor"}`;
    document.getElementById("sb-doctor-spec").textContent =
      userData.specialization || "Doctor";

    await loadSettings();
    await loadData();

    const loader = document.getElementById("page-loader");
    loader.classList.add("hidden");
    setTimeout(() => loader.remove(), 500);
  });

</script>
</body>
</html>
